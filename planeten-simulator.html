<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Planeten-Simulator — Fotorealistische Welten &amp; N-Body-Sonnensystem</title>
<meta name="description" content="Planeten im Detail bearbeiten und ganze Sonnensysteme mit echter Gravitation simulieren — direkt im Browser.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* ---- Boeffes ToolBox Design-Tokens ---- */
    --void:#0A0C0F; --steel:#101319; --steel-2:#161A21; --steel-3:#1C212A;
    --rail:#232932; --rail-2:#333B47; --rail-3:#414B5A;
    --ink:#ECEFF4; --ink-2:#A2ADBB; --ink-3:#6A7482; --ink-4:#48515E;
    --disp:"Space Grotesk", system-ui, -apple-system, "Segoe UI", sans-serif;
    --mono:"JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    --sans:system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --ease:cubic-bezier(.2,.7,.2,1);

    /* ---- Tool-Akzent: Solar-Orange ---- */
    --acc:#F97316; --acc-2:#FDBA74;

    /* kanonisches Boeffes-Blau der Logo-Kachel (ueber alle Tools gleich) */
    --logo-a:#7FB4FF; --logo-b:#4F7DF0;

    --line:rgba(255,255,255,.07);
    --ok:#34D399; --warn:#FBBF24; --bad:#F87171; --cold:#7DD3FC;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--void);overflow:hidden;color:var(--ink);
    font-family:var(--sans);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  button{font-family:inherit}
  #gl{position:fixed;inset:0;width:100%;height:100%;display:block;z-index:0;cursor:grab;touch-action:none}
  #gl.grabbing{cursor:grabbing}
  #gl.aim{cursor:crosshair}

  /* ---------- Labels (Planetennamen im Raum) ---------- */
  #labels{position:fixed;inset:0;z-index:2;pointer-events:none;overflow:hidden}
  .plabel{position:absolute;transform:translate(-50%,-130%);pointer-events:auto;cursor:pointer;
    font:500 10.5px/1.25 var(--mono);letter-spacing:.08em;color:var(--ink-2);white-space:nowrap;
    text-shadow:0 1px 6px #000c, 0 0 14px #0009;transition:color .15s;user-select:none;-webkit-user-select:none}
  .plabel:hover{color:var(--ink)}
  .plabel.sel{color:var(--acc-2)}
  .plabel .sub{display:block;font-size:8.5px;color:var(--ink-3);letter-spacing:.06em;text-align:center}
  .plabel.sel .sub{color:var(--acc)}

  /* ---------- Brand oben links ---------- */
  .brand{position:fixed;left:18px;top:15px;z-index:5;pointer-events:none}
  .brand .sig{display:flex;align-items:center;gap:8px}
  .brand .sig-tile{width:22px;height:22px;border-radius:6px;flex:none;
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(150deg,var(--logo-a),var(--logo-b));
    color:#fff;font:700 14px/1 var(--disp);
    box-shadow:inset 0 0 0 1px #ffffff33, inset 0 1px 0 #ffffff55, 0 2px 8px -2px #000a}
  .brand .sig-word{font:700 14px/1 var(--disp);letter-spacing:-.01em;color:var(--ink);
    text-shadow:0 1px 10px rgba(0,0,0,.65)}
  .brand .sig-word i{font-style:normal;color:var(--acc)}
  .brand h1{margin:9px 0 0;font:600 18px/1 var(--disp);letter-spacing:.01em;color:#fff;
    text-shadow:0 1px 14px rgba(0,0,0,.6)}
  .brand .eye{margin-top:3px;font:600 8.5px/1 var(--mono);letter-spacing:.28em;
    color:var(--acc);text-transform:uppercase;text-shadow:0 1px 8px rgba(0,0,0,.6)}

  /* ---------- Modus-Tabs oben mittig ---------- */
  #modetabs{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:6;
    display:flex;gap:4px;padding:4px;border-radius:12px;
    background:rgba(16,19,25,.82);backdrop-filter:blur(20px) saturate(1.25);
    -webkit-backdrop-filter:blur(20px) saturate(1.25);
    border:1px solid var(--line);box-shadow:0 14px 44px -18px rgba(0,0,0,.7)}
  #modetabs button{appearance:none;border:0;cursor:pointer;border-radius:9px;
    padding:8px 15px;font:600 12.5px/1 var(--disp);letter-spacing:.02em;
    color:var(--ink-2);background:transparent;transition:all .18s var(--ease);display:flex;gap:7px;align-items:center}
  #modetabs button svg{width:14px;height:14px;opacity:.8}
  #modetabs button:hover{color:var(--ink)}
  #modetabs button.on{color:#0d0800;background:linear-gradient(180deg,var(--acc-2),var(--acc));
    box-shadow:0 3px 14px -4px rgba(249,115,22,.55), inset 0 1px 0 #ffffff66}

  /* ---------- Instrumenten-Panel rechts ---------- */
  #panel{position:fixed;top:14px;right:14px;width:324px;max-height:calc(100vh - 28px);
    z-index:10;display:flex;flex-direction:column;
    background:rgba(16,19,25,.82);backdrop-filter:blur(20px) saturate(1.25);
    -webkit-backdrop-filter:blur(20px) saturate(1.25);
    border:1px solid var(--line);border-radius:14px;
    box-shadow:0 24px 60px -22px rgba(0,0,0,.7), inset 0 1px 0 rgba(255,255,255,.05);
    overflow:hidden;transition:transform .3s var(--ease), opacity .3s}
  #panelhead{display:flex;align-items:center;gap:8px;padding:11px 14px;border-bottom:1px solid var(--line);flex:none}
  #panelhead .tt{font:600 12px/1 var(--disp);letter-spacing:.14em;text-transform:uppercase;color:var(--ink-2)}
  #panelhead .dot{width:6px;height:6px;border-radius:50%;background:var(--acc);box-shadow:0 0 8px var(--acc)}
  #panelhead .sp{flex:1}
  .iconbtn{appearance:none;border:0;background:var(--steel-3);color:var(--ink-2);cursor:pointer;
    width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;
    transition:all .15s}
  .iconbtn:hover{background:var(--rail);color:var(--ink)}
  .iconbtn svg{width:13px;height:13px}
  #panelbody{overflow-y:auto;overscroll-behavior:contain;padding:4px 14px 14px;scrollbar-width:thin;scrollbar-color:var(--rail-2) transparent}
  #panelbody::-webkit-scrollbar{width:8px}
  #panelbody::-webkit-scrollbar-thumb{background:var(--rail);border-radius:4px;border:2px solid transparent;background-clip:content-box}

  /* Sektionen */
  .sec{border-bottom:1px solid var(--line);padding:10px 0 12px}
  .sec:last-child{border-bottom:0}
  .sec-h{display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none;-webkit-user-select:none;padding:3px 0}
  .sec-h .cap{font:600 9.5px/1 var(--mono);letter-spacing:.24em;text-transform:uppercase;color:var(--ink-3)}
  .sec-h:hover .cap{color:var(--ink-2)}
  .sec-h .chev{margin-left:auto;color:var(--ink-4);transition:transform .2s var(--ease)}
  .sec-h .chev svg{width:11px;height:11px;display:block}
  .sec.closed .chev{transform:rotate(-90deg)}
  .sec-b{padding-top:8px;display:flex;flex-direction:column;gap:9px}
  .sec.closed .sec-b{display:none}

  /* Slider-Reihe */
  .row{display:flex;flex-direction:column;gap:5px}
  .row .lr{display:flex;align-items:baseline;gap:8px}
  .row label{font:500 11.5px/1.2 var(--sans);color:var(--ink-2)}
  .row .val{margin-left:auto;font:500 10.5px/1 var(--mono);color:var(--acc-2);white-space:nowrap}
  input[type=range]{appearance:none;-webkit-appearance:none;width:100%;height:22px;background:transparent;cursor:pointer;margin:0}
  input[type=range]::-webkit-slider-runnable-track{height:4px;border-radius:2px;
    background:linear-gradient(90deg,var(--acc) var(--fill,50%),var(--rail) var(--fill,50%))}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;
    background:#fff;margin-top:-5px;box-shadow:0 1px 6px #000a, 0 0 0 1px #0006;transition:transform .12s}
  input[type=range]:hover::-webkit-slider-thumb{transform:scale(1.15)}
  input[type=range]::-moz-range-track{height:4px;border-radius:2px;background:var(--rail)}
  input[type=range]::-moz-range-progress{height:4px;border-radius:2px;background:var(--acc)}
  input[type=range]::-moz-range-thumb{width:14px;height:14px;border:0;border-radius:50%;background:#fff;box-shadow:0 1px 6px #000a}

  /* Toggles */
  .tgl{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;-webkit-user-select:none}
  .tgl input{display:none}
  .tgl .sw{width:30px;height:17px;border-radius:9px;background:var(--rail);position:relative;flex:none;transition:background .18s}
  .tgl .sw::after{content:"";position:absolute;left:2px;top:2px;width:13px;height:13px;border-radius:50%;
    background:var(--ink-2);transition:all .18s var(--ease)}
  .tgl input:checked + .sw{background:var(--acc)}
  .tgl input:checked + .sw::after{left:15px;background:#fff}
  .tgl .tl{font:500 11.5px/1.2 var(--sans);color:var(--ink-2)}
  .tgl:hover .tl{color:var(--ink)}
  .tglgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px 10px}

  /* Chips (Körperauswahl etc.) */
  .chips{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
  .chip{appearance:none;border:1px solid var(--line);background:var(--steel-2);color:var(--ink-2);
    border-radius:9px;padding:7px 4px 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;
    transition:all .15s var(--ease)}
  .chip .em{font-size:15px;line-height:1;filter:saturate(.9)}
  .chip .nm{font:600 9px/1 var(--mono);letter-spacing:.08em;text-transform:uppercase}
  .chip:hover{border-color:var(--rail-2);color:var(--ink);background:var(--steel-3)}
  .chip.on{border-color:var(--acc);color:var(--acc-2);background:rgba(249,115,22,.12);
    box-shadow:0 0 0 1px rgba(249,115,22,.25), 0 4px 16px -8px rgba(249,115,22,.5)}

  /* Segment-Buttons (kleine Auswahl) */
  .segs{display:flex;gap:4px;flex-wrap:wrap}
  .seg{appearance:none;border:1px solid var(--line);background:var(--steel-2);color:var(--ink-2);cursor:pointer;
    border-radius:8px;padding:5px 9px;font:500 10.5px/1 var(--sans);transition:all .15s}
  .seg:hover{color:var(--ink);border-color:var(--rail-2)}
  .seg.on{border-color:var(--acc);color:var(--acc-2);background:rgba(249,115,22,.12)}

  /* Buttons */
  .btn{appearance:none;border:1px solid var(--line);border-radius:9px;cursor:pointer;
    padding:8px 11px;font:600 11.5px/1 var(--disp);letter-spacing:.02em;
    background:var(--steel-3);color:var(--ink-2);transition:all .16s var(--ease);
    display:inline-flex;align-items:center;justify-content:center;gap:6px}
  .btn:hover{color:var(--ink);background:var(--rail);border-color:var(--rail-2)}
  .btn.acc{background:linear-gradient(180deg,var(--acc-2),var(--acc));color:#0d0800;border-color:transparent;
    box-shadow:0 4px 16px -6px rgba(249,115,22,.55), inset 0 1px 0 #ffffff55}
  .btn.acc:hover{filter:brightness(1.07)}
  .btn.on{border-color:var(--acc);color:var(--acc-2);background:rgba(249,115,22,.14)}
  .btn.sm{padding:6px 9px;font-size:10.5px}
  .btnrow{display:flex;gap:6px;flex-wrap:wrap}
  .btnrow .btn{flex:1 1 auto}

  select{appearance:none;border:1px solid var(--line);background:var(--steel-2) url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="6" viewBox="0 0 10 6" fill="none" stroke="%23A2ADBB" stroke-width="1.6"><path d="M1 1l4 4 4-4"/></svg>') no-repeat right 9px center;
    color:var(--ink);border-radius:9px;padding:7px 26px 7px 10px;font:500 11.5px/1.2 var(--sans);cursor:pointer;width:100%}
  select:hover{border-color:var(--rail-2)}

  .note{font:400 10.5px/1.45 var(--sans);color:var(--ink-3)}
  .note b{color:var(--ink-2);font-weight:600}

  /* ---------- Infokarte unten links ---------- */
  #infocard{position:fixed;left:18px;bottom:16px;z-index:9;width:308px;max-height:min(58vh, 520px);
    display:flex;flex-direction:column;
    background:rgba(16,19,25,.82);backdrop-filter:blur(20px) saturate(1.25);
    -webkit-backdrop-filter:blur(20px) saturate(1.25);
    border:1px solid var(--line);border-radius:14px;
    box-shadow:0 24px 60px -22px rgba(0,0,0,.7), inset 0 1px 0 rgba(255,255,255,.05);
    overflow:hidden;transition:transform .3s var(--ease), opacity .3s}
  #infocard.hidden{opacity:0;pointer-events:none;transform:translateY(12px)}
  #infobody{overflow-y:auto;padding:13px 15px 14px;scrollbar-width:thin;scrollbar-color:var(--rail-2) transparent}
  #infobody::-webkit-scrollbar{width:8px}
  #infobody::-webkit-scrollbar-thumb{background:var(--rail);border-radius:4px}
  .ic-h{display:flex;align-items:center;gap:9px;margin-bottom:2px}
  .ic-h .em{font-size:20px;line-height:1}
  .ic-h h3{margin:0;font:600 16px/1.1 var(--disp);color:#fff}
  .ic-h .close{margin-left:auto}
  .ic-kick{font:600 8.5px/1 var(--mono);letter-spacing:.26em;text-transform:uppercase;color:var(--acc);margin-bottom:10px}
  .statgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:8px 0 4px}
  .stat{background:var(--steel-2);border:1px solid var(--line);border-radius:9px;padding:7px 9px}
  .stat .k{font:500 8.5px/1 var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);margin-bottom:4px}
  .stat .v{font:600 12.5px/1.2 var(--mono);color:var(--ink)}
  .stat .v small{font-size:9px;color:var(--ink-3);font-weight:500}
  .stat.wide{grid-column:1 / -1}
  .stat.hl .v{color:var(--acc-2)}
  .facts{font:400 11.5px/1.55 var(--sans);color:var(--ink-2);margin:8px 0 0}
  .facts b{color:var(--ink);font-weight:600}
  .tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:9px}
  .tag{font:600 9px/1 var(--mono);letter-spacing:.08em;padding:5px 8px;border-radius:6px;
    background:var(--steel-3);border:1px solid var(--line);color:var(--ink-2)}
  .tag.ok{color:var(--ok);border-color:rgba(52,211,153,.3)}
  .tag.warn{color:var(--warn);border-color:rgba(251,191,36,.3)}
  .tag.bad{color:var(--bad);border-color:rgba(248,113,113,.3)}
  .tag.cold{color:var(--cold);border-color:rgba(125,211,252,.3)}
  .weightrow{display:flex;align-items:center;gap:8px;margin-top:9px;background:var(--steel-2);
    border:1px solid var(--line);border-radius:9px;padding:8px 10px}
  .weightrow label{font:500 10.5px/1.2 var(--sans);color:var(--ink-2);flex:1}
  .weightrow input{width:52px;appearance:none;border:1px solid var(--line);background:var(--steel-3);
    color:var(--ink);border-radius:6px;padding:4px 6px;font:500 11px/1 var(--mono);text-align:right}
  .weightrow .out{font:600 12px/1 var(--mono);color:var(--acc-2);white-space:nowrap}

  /* ---------- Zeitleiste unten mittig ---------- */
  #timebar{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:8;
    display:flex;align-items:center;gap:11px;padding:9px 13px;border-radius:13px;
    background:rgba(16,19,25,.82);backdrop-filter:blur(20px) saturate(1.25);
    -webkit-backdrop-filter:blur(20px) saturate(1.25);
    border:1px solid var(--line);box-shadow:0 14px 44px -18px rgba(0,0,0,.7);
    transition:opacity .3s, transform .3s var(--ease)}
  #timebar.hidden{opacity:0;pointer-events:none;transform:translate(-50%,12px)}
  #timebar .play{width:30px;height:30px;border-radius:9px;flex:none;appearance:none;border:0;cursor:pointer;
    background:linear-gradient(180deg,var(--acc-2),var(--acc));color:#0d0800;
    display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px -4px rgba(249,115,22,.55)}
  #timebar .play svg{width:13px;height:13px}
  #timebar .tcol{display:flex;flex-direction:column;gap:2px;min-width:132px}
  #timebar .tcol input[type=range]{height:16px}
  #timebar .trow{display:flex;align-items:baseline;gap:8px}
  #timebar .tspeed{font:600 10px/1 var(--mono);color:var(--acc-2);white-space:nowrap}
  #timebar .tlab{font:500 8.5px/1 var(--mono);letter-spacing:.18em;color:var(--ink-3);text-transform:uppercase}
  #timebar .tdate{display:flex;flex-direction:column;gap:2px;border-left:1px solid var(--line);padding-left:11px}
  #timebar .tdate .d{font:600 11.5px/1 var(--mono);color:var(--ink);white-space:nowrap}
  #timebar .tdate .y{font:500 9px/1 var(--mono);color:var(--ink-3);white-space:nowrap}

  /* ---------- Hinweis-Bar (Planet platzieren) ---------- */
  #hintbar{position:fixed;top:64px;left:50%;transform:translateX(-50%);z-index:7;
    display:none;align-items:center;gap:9px;padding:9px 14px;border-radius:11px;
    background:rgba(249,115,22,.14);border:1px solid rgba(249,115,22,.4);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    font:500 11.5px/1.35 var(--sans);color:var(--acc-2);max-width:min(480px, 92vw);text-align:center}
  #hintbar.show{display:flex}
  #hintbar .x{appearance:none;border:0;background:transparent;color:var(--acc-2);cursor:pointer;font-size:14px;line-height:1;padding:2px}

  /* ---------- Toast ---------- */
  #toast{position:fixed;top:64px;left:50%;transform:translateX(-50%) translateY(-8px);z-index:20;
    padding:9px 15px;border-radius:11px;background:rgba(16,19,25,.94);border:1px solid var(--line);
    font:500 11.5px/1.4 var(--sans);color:var(--ink);opacity:0;pointer-events:none;
    transition:opacity .25s, transform .25s var(--ease);max-width:min(440px,92vw);text-align:center;
    box-shadow:0 14px 44px -14px #000}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ---------- FAB (mobil) ---------- */
  #panelfab{position:fixed;right:14px;bottom:16px;z-index:11;width:44px;height:44px;border-radius:13px;
    appearance:none;border:1px solid var(--line);cursor:pointer;display:none;align-items:center;justify-content:center;
    background:rgba(16,19,25,.9);backdrop-filter:blur(16px);color:var(--acc-2);
    box-shadow:0 14px 40px -14px rgba(0,0,0,.8)}
  #panelfab svg{width:19px;height:19px}

  /* ---------- Loader ---------- */
  #loader{position:fixed;inset:0;z-index:50;background:radial-gradient(120% 100% at 50% 0%, #101623 0%, var(--void) 58%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;
    transition:opacity .6s var(--ease);}
  #loader.done{opacity:0;pointer-events:none}
  .ld-orb{position:relative;width:104px;height:104px;margin-bottom:26px}
  .ld-orb .sun{position:absolute;left:50%;top:50%;width:26px;height:26px;border-radius:50%;transform:translate(-50%,-50%);
    background:radial-gradient(circle at 38% 34%, #FFE9C4, var(--acc) 58%, #B34A02);
    box-shadow:0 0 26px rgba(249,115,22,.75), 0 0 74px rgba(249,115,22,.3)}
  .ld-orb .ring{position:absolute;inset:0;border-radius:50%;border:1px solid rgba(255,255,255,.12);animation:ldspin 2.8s linear infinite}
  .ld-orb .ring::after{content:"";position:absolute;top:-3.5px;left:50%;width:7px;height:7px;border-radius:50%;
    background:#9DC4FF;box-shadow:0 0 10px #9DC4FFcc}
  .ld-orb .ring.r2{inset:14px;animation-duration:1.9s;animation-direction:reverse}
  .ld-orb .ring.r2::after{background:#E8B98A;width:5px;height:5px}
  @keyframes ldspin{to{transform:rotate(360deg)}}
  #loader .word{font:700 15px/1 var(--disp);color:var(--ink)}
  #loader .word i{font-style:normal;color:var(--acc)}
  #loader .sub{margin-top:6px;font:600 8.5px/1 var(--mono);letter-spacing:.3em;text-transform:uppercase;color:var(--ink-3)}
  #loadbarw{margin-top:22px;width:216px;height:3px;border-radius:2px;background:var(--rail);overflow:hidden}
  #loadbar{height:100%;width:0%;border-radius:2px;background:linear-gradient(90deg,var(--acc),var(--acc-2));
    transition:width .25s var(--ease)}
  #loadmsg{margin-top:11px;font:500 9.5px/1.5 var(--mono);letter-spacing:.1em;color:var(--ink-3);text-align:center;min-height:14px}
  #loadcredit{position:absolute;bottom:18px;font:400 9px/1.6 var(--mono);letter-spacing:.06em;color:var(--ink-4);text-align:center;padding:0 20px}

  /* ---------- Mobile ---------- */
  @media (max-width: 900px){
    #panel{top:auto;bottom:0;right:0;left:0;width:100%;max-height:62vh;border-radius:16px 16px 0 0;
      transform:translateY(calc(100% + 10px))}
    #panel.open{transform:translateY(0)}
    #panelfab{display:flex}
    #infocard{left:10px;bottom:70px;width:min(300px, calc(100vw - 76px));max-height:44vh}
    #timebar{bottom:70px;left:10px;transform:none;right:auto;max-width:calc(100vw - 76px);flex-wrap:wrap;gap:8px}
    #timebar.hidden{transform:translateY(12px)}

function loadImage(url, timeout=9000){
  return new Promise((res, rej)=>{
    const img = new Image(); img.crossOrigin = 'anonymous';
    const t = setTimeout(()=>{ img.src=''; rej(new Error('timeout')); }, timeout);
    img.onload = ()=>{ clearTimeout(t); res(img); };
    img.onerror = ()=>{ clearTimeout(t); rej(new Error('err')); };
    img.src = url;
  });
}

const TexMan = {
  cache:new Map(), aniso:1, status:{net:0, proc:0, fail:0},
  onprogress:null, planned:0, done:0,
  _mk(srcEl, {srgb=false}={}){
    const t = new THREE.Texture(srcEl);
    t.colorSpace = srgb ? THREE.SRGBColorSpace : THREE.NoColorSpace;
    t.anisotropy = this.aniso; t.wrapS = THREE.RepeatWrapping; t.wrapT = THREE.ClampToEdgeWrapping;
    t.needsUpdate = true; return t;
  },
  async get(name){
    if (this.cache.has(name)) return this.cache.get(name);
    const p = this._load(name); this.cache.set(name, p); return p;
  },
  async _load(name){
    const src = TEXSRC[name]; if (!src) return null;
    let img = null;
    for (const u of src.urls){ try { img = await loadImage(u); break; } catch(e){} }
    let tex = null;
    if (img){
      this.status.net++;
      if (src.height2normal){
        const { normal, height } = normalAndHeightFromImage(img);
        this.cache.set(name + ':height', Promise.resolve(this._mk(height, {})));
        tex = this._mk(normal, {});
      }
      else tex = this._mk(img, src);
    } else if (src.fb){
      this.status.proc++;
      const c = await src.fb(); tex = this._mk(c.canvas || c, src);
    } else { this.status.fail++; }
    this.done++; if (this.onprogress) this.onprogress(this.done, this.planned, name);
    return tex;
  },
  async getCoast(specName){
    const key = 'coast:' + specName;
    if (this.cache.has(key)) return this.cache.get(key);
    const p = (async () => {
      const spec = await this.get(specName);
      if (!spec || !spec.image) return null;
      try { return this._mk(coastMapFromSpec(spec.image), {}); } catch(e){ return null; }
    })();
    this.cache.set(key, p); return p;
  },
  async getUltra(name){
    const key = 'ultra:'+name;
    if (this.cache.has(key)) return this.cache.get(key);
    const url = ULTRA[name]; if (!url) return null;
    const p = (async ()=>{
      try { const img = await loadImage(url, 24000); this.status.net++; return this._mk(img, TEXSRC[name]||{srgb:true}); }
      catch(e){ return null; }
    })();
    this.cache.set(key, p); return p;
  }
};

/* ---------- Höhenbild → Normal-Map (+ Höhenkarte für Klima/Fluten) ---------- */
function normalAndHeightFromImage(img){
  const w = Math.min(img.width, 2048), h = Math.min(img.height, 1024);
  const c = document.createElement('canvas'); c.width = w; c.height = h;
  const x = c.getContext('2d', {willReadFrequently:true}); x.drawImage(img, 0, 0, w, h);
  const d = x.getImageData(0, 0, w, h).data;
  const H = new Float32Array(w*h);
  let mn = 1, mx = 0;
  for (let i=0;i<w*h;i++){ const v = d[i*4]/255; H[i] = v; if (v < mn) mn = v; if (v > mx) mx = v; }
  /* Höhenkarte auf vollen Bereich strecken (sonst bleiben Tiefebenen «unflutbar») */
  const span = Math.max(mx - mn, 0.01);
  const hc = mkCanvas(w, h), hx = hc.getContext('2d'), hi = hx.createImageData(w, h);
  for (let i=0;i<w*h;i++){ const v = clamp((H[i] - mn) / span, 0, 1) * 255; hi.data[i*4]=v; hi.data[i*4+1]=v; hi.data[i*4+2]=v; hi.data[i*4+3]=255; }
  hx.putImageData(hi, 0, 0);
  return { normal: normalCanvasFromHeight(H, w, h, 1.6), height: hc };
}

/* ---------- Küsten-Distanzkarte: Landmaske weichzeichnen ----------
 * 0 = tiefer Ozean … 1 = tiefes Inland; 0.5 ≈ Küstenlinie.
 * Damit lassen sich Meeresspiegel-Änderungen im Shader darstellen. */
function coastMapFromSpec(specImgOrCanvas){
  const W = 512, H = 256;
  const c = mkCanvas(W, H), x = c.getContext('2d', {willReadFrequently:true});
  x.drawImage(specImgOrCanvas, 0, 0, W, H);
  const d = x.getImageData(0, 0, W, H).data;
  let a = new Float32Array(W*H), b = new Float32Array(W*H);
  for (let i=0;i<W*H;i++) a[i] = d[i*4] > 110 ? 0 : 1;   /* Specular hell = Wasser */
  /* Boxblur (wrap in X) — bewusst schmal, damit schmale Halbinseln (Florida!)
   * im Landesinneren klar über 0.5 bleiben und nicht schon bei Mini-Fluten absaufen */
  const R = 3;
  for (let pass=0; pass<2; pass++){
    for (let j=0;j<H;j++){
      const j0 = j*W;
      for (let i=0;i<W;i++){
        let s = 0;
        for (let k=-R;k<=R;k++) s += a[j0 + ((i+k)%W + W)%W];
        b[j0+i] = s / (2*R+1);
      }
    }
    for (let i=0;i<W;i++){
      for (let j=0;j<H;j++){
        let s = 0, n = 0;
        for (let k=-R;k<=R;k++){ const jj = j+k; if (jj<0||jj>=H) continue; s += b[jj*W+i]; n++; }
        a[j*W+i] = s / n;
      }
    }
  }
  const out = x.createImageData(W, H);
  for (let i=0;i<W*H;i++){ const v = clamp(a[i],0,1)*255; out.data[i*4]=v; out.data[i*4+1]=v; out.data[i*4+2]=v; out.data[i*4+3]=255; }
  x.putImageData(out, 0, 0);
  return c;
}
function normalCanvasFromHeight(H, w, h, strength=1.4){
  const c = document.createElement('canvas'); c.width = w; c.height = h;
  const x = c.getContext('2d'); const out = x.createImageData(w, h); const o = out.data;
  for (let j=0;j<h;j++){
    const jm = Math.max(0,j-1)*w, jp = Math.min(h-1,j+1)*w, j0 = j*w;
    for (let i=0;i<w;i++){
      const im = (i-1+w)%w, ip = (i+1)%w;
      const dx = (H[j0+ip] - H[j0+im]) * strength;
      const dy = (H[jp+i] - H[jm+i]) * strength;
      const inv = 1/Math.sqrt(dx*dx + dy*dy + 1);
      const k = (j0+i)*4;
      o[k]   = (-dx*inv*0.5 + 0.5) * 255;
      o[k+1] = ( dy*inv*0.5 + 0.5) * 255;   /* three.js: +Y = UV nach oben */
      o[k+2] = (inv*0.5 + 0.5) * 255;
      o[k+3] = 255;
    }
  }
  x.putImageData(out, 0, 0); return c;
}

/* ============================================================
 *  PROZEDURALE TEXTUREN  (Fallback + «Eigener Planet»)
 * ============================================================ */
function samplePal(stops, t){
  t = clamp(t, 0, 1);
  for (let i=1;i<stops.length;i++){
    if (t <= stops[i][0]){
      const [t0,...c0] = stops[i-1], [t1,...c1] = stops[i];
      const f = (t - t0) / Math.max(1e-6, t1 - t0);
      return [lerp(c0[0],c1[0],f), lerp(c0[1],c1[1],f), lerp(c0[2],c1[2],f)];
    }
  }
  return stops[stops.length-1].slice(1);
}

function mkCanvas(w, h){ const c = document.createElement('canvas'); c.width = w; c.height = h; return c; }

function procRocky(seed, pal, W=1024){
  const H = W>>1, c = mkCanvas(W, H), x = c.getContext('2d');
  const img = x.createImageData(W, H), d = img.data;
  const stops = ROCKY_PAL[pal] || ROCKY_PAL.fels;
  const F = 5, hgt = new Float32Array(W*H);
  for (let j=0;j<H;j++){
    const v = j/H;
    for (let i=0;i<W;i++){
      const u = i/W;
      let hv = fbm(u*F, v*F*0.55 + 7, seed, 5, 2.1, 0.52, F);
      hv = hv*0.85 + 0.15*ridged(u*F*2.3, v*F*1.3, seed+5, 4, F*2.3);
      hgt[j*W+i] = hv;
    }
  }
  /* Krater einstanzen */
  const rnd = mulberry32(seed*77+3);
  const n = pal==='mond'||pal==='merkur' ? 190 : (pal==='pluto' ? 60 : 26);
  for (let k=0;k<n;k++){
    const cx = rnd()*W, cy = (0.08+0.84*rnd())*H;
    const R = (2 + Math.pow(rnd(), 2.6)*46) * W/1024;
    const depth = 0.16 + rnd()*0.2;
    const i0 = Math.ceil(cx-R-2), i1 = Math.floor(cx+R+2), j0 = Math.max(0,Math.ceil(cy-R-2)), j1 = Math.min(H-1,Math.floor(cy+R+2));
    for (let j=j0;j<=j1;j++) for (let i=i0;i<=i1;i++){
      const ii = ((i%W)+W)%W;
      const dx = i-cx, dy = j-cy, q = Math.sqrt(dx*dx+dy*dy)/R;
      if (q > 1.16) continue;
      const idx = j*W+ii;
      if (q < 0.82){ hgt[idx] -= depth * (0.72 + 0.28*Math.cos(q/0.82*Math.PI)); }
      else { hgt[idx] += depth * 0.55 * Math.sin((q-0.82)/0.34*Math.PI); }
    }
  }
  for (let j=0;j<H;j++) for (let i=0;i<W;i++){
    const idx = j*W+i, hv = clamp(hgt[idx], -0.2, 1.2);
    const [r,g,b] = samplePal(stops, hv);
    const grain = 0.94 + 0.12*hashN(i,j,seed+99);
    const k = idx*4;
    d[k] = r*grain; d[k+1] = g*grain; d[k+2] = b*grain; d[k+3] = 255;
  }
  x.putImageData(img, 0, 0);
  return { canvas:c, normal:normalCanvasFromHeight(hgt, W, H, 2.2) };
}

function procGas(seed, pal, W=1024){
  const H = W>>1, c = mkCanvas(W, H), x = c.getContext('2d');
  const img = x.createImageData(W, H), d = img.data;
  const stops = GAS_PAL[pal] || GAS_PAL.exoWarm;
  const bandF = pal==='jupiter' ? 11 : pal==='saturn' ? 8 : 3.2;
  const turb  = pal==='jupiter' ? 0.9 : pal==='saturn' ? 0.35 : 0.16;
  /* Wirbel (Grosser Fleck) */
  const rnd = mulberry32(seed*13+5);
  const spots = [];
  if (pal==='jupiter' || pal==='exoWarm') spots.push({u:0.62, v:0.66, r:0.085, s:2.6});
  if (pal==='neptun') spots.push({u:0.4, v:0.42, r:0.06, s:1.8});
  for (let s=0; s<(pal==='jupiter'?3:0); s++) spots.push({u:rnd(), v:0.3+0.4*rnd(), r:0.02+0.03*rnd(), s:1.2+rnd()});
  for (let j=0;j<H;j++){
    const v = j/H;
    for (let i=0;i<W;i++){
      const u = i/W;
      let uu = u, vv = v;
      for (const sp of spots){
        let du = uu - sp.u; du -= Math.round(du);   /* wrap */
        const dv = (vv - sp.v) * 2;
        const q2 = (du*du + dv*dv) / (sp.r*sp.r);
        if (q2 < 9){
          const ang = sp.s * Math.exp(-q2*0.6);
          const ca = Math.cos(ang), sa = Math.sin(ang);
          const nu = du*ca - dv*sa, nv = du*sa + dv*ca;
          uu = sp.u + nu; vv = sp.v + nv/2;
        }
      }
      const warp = (fbm(uu*6, vv*14, seed+21, 4, 2.2, 0.5, 6) - 0.5) * turb * 0.14
                 + (fbm(uu*18, vv*4, seed+55, 3, 2.1, 0.5, 18) - 0.5) * turb * 0.05;
      let t = Math.sin((vv + warp) * bandF * Math.PI) * 0.5 + 0.5;
      t = t*0.8 + 0.2*fbm(uu*3, vv*9, seed+8, 3, 2, 0.5, 3);
      let [r,g,b] = samplePal(stops, t);
      /* Fleckkerne leicht einfärben */
      for (const sp of spots){
        let du = u - sp.u; du -= Math.round(du);
        const dv = (v - sp.v)*2, q2 = (du*du+dv*dv)/(sp.r*sp.r);
        if (q2 < 1.4 && (pal==='jupiter'||pal==='exoWarm')){ const f = Math.exp(-q2*1.6)*0.55; r = lerp(r, 205, f); g = lerp(g, 100, f); b = lerp(b, 70, f); }
        if (q2 < 1.4 && pal==='neptun'){ const f = Math.exp(-q2*1.6)*0.5; r = lerp(r, 20, f); g = lerp(g, 30, f); b = lerp(b, 90, f); }
      }
      const k = (j*W+i)*4;
      d[k]=r; d[k+1]=g; d[k+2]=b; d[k+3]=255;
    }
  }
  x.putImageData(img, 0, 0);
  return { canvas:c };
}

function procClouds(seed, cov=0.5, thick=0, W=1024){
  const H = W>>1, c = mkCanvas(W, H), x = c.getContext('2d');
  const img = x.createImageData(W, H), d = img.data;
  for (let j=0;j<H;j++){
    const v = j/H, lat = Math.abs(v-0.5)*2;
    for (let i=0;i<W;i++){
      const u = i/W;
      let n = fbm(u*7, v*4.2, seed, 5, 2.3, 0.52, 7);
      n = n*0.72 + 0.28*ridged(u*16, v*8, seed+3, 4, 16);
      let a = smoothstepJS(0.62 - cov*0.34, 0.78 - cov*0.1, n);
      if (thick > 0){ a = clamp(a + thick*0.75, 0, 1); }
      a *= 0.72 + 0.28*Math.sin(lat*Math.PI); /* Polnähe etwas dünner */
      const k = (j*W+i)*4;
      const br = 235 + 20*n;
      d[k]=br; d[k+1]=br; d[k+2]=br; d[k+3]=a*255;
    }
  }
  x.putImageData(img, 0, 0);
  return { canvas:c, alpha:true };
}
function smoothstepJS(a, b, x){ const t = clamp((x-a)/(b-a), 0, 1); return t*t*(3-2*t); }

function procSun(seed, W=1024){
  const H = W>>1, c = mkCanvas(W, H), x = c.getContext('2d');
  const img = x.createImageData(W, H), d = img.data;
  for (let j=0;j<H;j++){
    const v = j/H;
    for (let i=0;i<W;i++){
      const u = i/W;
      const g1 = fbm(u*24, v*12, seed, 5, 2.2, 0.55, 24);
      const g2 = ridged(u*46, v*23, seed+9, 4, 46);
      const t = clamp(g1*0.6 + g2*0.55 - 0.18, 0, 1);
      const r = 255, g = 150 + 90*t, b = 40 + 120*t*t;
      const k = (j*W+i)*4;
      d[k]=r; d[k+1]=g; d[k+2]=b; d[k+3]=255;
    }
  }
  x.putImageData(img, 0, 0);
  return { canvas:c };
}

function procRing(seed){
  const W = 1024, H = 64, c = mkCanvas(W, H), x = c.getContext('2d');
  const img = x.createImageData(W, H), d = img.data;
  for (let i=0;i<W;i++){
    const t = i/W;
    let a = fbm(t*26, 0.5, seed, 4, 2.2, 0.55) * 0.9;
    a *= smoothstepJS(0, 0.05, t) * (1 - smoothstepJS(0.94, 1, t));
    if (t > 0.60 && t < 0.665) a *= 0.12;          /* Cassini-Teilung */
    if (t > 0.33 && t < 0.352) a *= 0.4;
    const br = 176 + 60*fbm(t*60, 2, seed+4, 3);
    for (let j=0;j<H;j++){
      const k = (j*W+i)*4;
      d[k]=br; d[k+1]=br*0.94; d[k+2]=br*0.85; d[k+3]=clamp(a,0,1)*255;
    }
  }
  x.putImageData(img, 0, 0);
  return { canvas:c, alpha:true };
}

function procMilky(seed){
  const W = 2048, H = 1024, c = mkCanvas(W, H), x = c.getContext('2d');
  x.fillStyle = '#03040a'; x.fillRect(0,0,W,H);
  /* Galaktisches Band als Nebel */
  const img = x.getImageData(0,0,W,H), d = img.data;
  for (let j=0;j<H;j++){
    const v = j/H;
    for (let i=0;i<W;i++){
      const u = i/W;
      const band = Math.exp(-Math.pow((v - 0.5 + 0.10*Math.sin(u*TAU)) * 4.6, 2));
      if (band < 0.015) continue;
      const n = fbm(u*10, v*10, seed+1, 4, 2.4, 0.55, 10);
      const dust = fbm(u*22, v*18, seed+7, 4, 2.2, 0.5, 22);
      const glow = band * (0.25 + 0.75*n);
      const k = (j*W+i)*4;
      d[k]   = Math.min(255, d[k]   + glow*(60 + 40*dust));
      d[k+1] = Math.min(255, d[k+1] + glow*(58 + 30*dust));
      d[k+2] = Math.min(255, d[k+2] + glow*(80 + 46*dust));
      if (dust > 0.62 && band > 0.3){ const s = (dust-0.62)*2.2*band;
        d[k] *= (1-s*0.7); d[k+1] *= (1-s*0.75); d[k+2] *= (1-s*0.7); }
    }
  }
  x.putImageData(img, 0, 0);
  /* Sterne */
  const rnd = mulberry32(seed*991);
  for (let s=0;s<2600;s++){
    const u = rnd(); let v = rnd();
    if (rnd() < 0.55) v = 0.5 + 0.10*Math.sin(u*TAU) + (rnd()-0.5)*0.22*rnd();
    const m = rnd();
    const r = m < 0.93 ? 0.6 : (m < 0.99 ? 1.1 : 1.8);
    const cch = rnd();
    x.fillStyle = cch < 0.12 ? 'rgba(255,190,150,ALPHA)'.replace('ALPHA', (0.3+0.7*rnd()).toFixed(2))
               : cch < 0.3 ? 'rgba(170,200,255,ALPHA)'.replace('ALPHA', (0.3+0.7*rnd()).toFixed(2))
               : 'rgba(235,240,255,ALPHA)'.replace('ALPHA', (0.25+0.75*rnd()).toFixed(2));
    x.beginPath(); x.arc(u*W, clamp(v,0,1)*H, r, 0, TAU); x.fill();
  }
  return { canvas:c };
}

/* ============================================================
 *  WELT-GENERATOR — «Eigener Planet» (+ Erd-Fallback)
 * ============================================================ */
function defWorld(type, seed){
  const base = { type, seed, sea:0.58, mount:0.55, veg:0.62, ice:0.15, crater:0, cities:0.45, lava:false, gasPal:'exoWarm' };
  switch(type){
    case 'wueste': return {...base, sea:0.05, veg:0.06, ice:0.03, crater:0.2, cities:0.05};
    case 'eis':    return {...base, sea:0.42, veg:0.02, ice:0.9, crater:0.06, cities:0};
    case 'ozean':  return {...base, sea:0.94, veg:0.75, ice:0.07, cities:0.15};
    case 'lava':   return {...base, sea:0.4, veg:0, ice:0, lava:true, cities:0, crater:0.1};
    case 'karg':   return {...base, sea:0, veg:0, ice:0.02, crater:0.85, cities:0};
    case 'gas':    return {...base, cities:0};
    default:       return base; /* terra */
  }
}

async function genWorld(P, W=2048, onprog=null){
  if (P.type === 'gas'){
    const g = procGas(P.seed, P.gasPal, W);
    return { map:g.canvas, normal:null, spec:null, night:null, emissive:null };
  }
  const H = W>>1;
  const SL = P.sea <= 0 ? -1 : 0.30 + P.sea*0.42;
  const hgt = new Float32Array(W*H);
  const seed = P.seed|0;

  /* --- Höhenfeld --- */
  for (let j=0;j<H;j++){
    const v = j/H;
    for (let i=0;i<W;i++){
      const u = i/W;
      const cont = fbm(u*3.1, v*1.75 + 3, seed, 5, 2.05, 0.55, 3.1);
      const rid  = ridged(u*8.5, v*4.6, seed+11, 5, 8.5);
      let hv = cont*0.74 + rid*P.mount*0.52*(0.35 + cont*0.9);
      hgt[j*W+i] = hv;
    }
    if (onprog && (j & 63) === 0){ onprog(j/H*0.55); await new Promise(r=>setTimeout(r)); }
  }
  /* --- Krater --- */
  if (P.crater > 0.01){
    const rnd = mulberry32(seed*31+7);
    const n = Math.round(P.crater*240);
    for (let k=0;k<n;k++){
      const cx = rnd()*W, cy = (0.06+0.88*rnd())*H;
      const R = (2 + Math.pow(rnd(), 2.4)*40) * W/1024, depth = 0.1 + rnd()*0.16;
      const j0 = Math.max(0, Math.ceil(cy-R-2)), j1 = Math.min(H-1, Math.floor(cy+R+2));
      for (let j=j0;j<=j1;j++) for (let i=Math.ceil(cx-R-2); i<=Math.floor(cx+R+2); i++){
        const ii = ((i%W)+W)%W, dx = i-cx, dy = j-cy, q = Math.sqrt(dx*dx+dy*dy)/R;
        if (q > 1.15) continue;
        const idx = j*W+ii;
        if (q < 0.8) hgt[idx] -= depth*(0.7+0.3*Math.cos(q/0.8*Math.PI));
        else hgt[idx] += depth*0.5*Math.sin((q-0.8)/0.35*Math.PI);
      }
    }
  }

  /* --- Farben --- */
  const map = mkCanvas(W,H), mx = map.getContext('2d'), mi = mx.createImageData(W,H), md = mi.data;
  const spec = mkCanvas(W,H), sx = spec.getContext('2d'), si = sx.createImageData(W,H), sd = si.data;
  const emis = P.lava ? mkCanvas(W,H) : null;
  const ei = emis ? emis.getContext('2d').createImageData(W,H) : null, ed = ei ? ei.data : null;
  const landmask = new Uint8Array(W*H);

  for (let j=0;j<H;j++){
    const v = j/H, latAbs = Math.abs(v-0.5)*2;
    for (let i=0;i<W;i++){
      const idx = j*W+i, k = idx*4;
      let h = hgt[idx];
      const moist = fbm(i/W*5.2, v*3.1 + 40, seed+31, 4, 2.2, 0.5, 5.2);
      const tvar  = fbm(i/W*7.1, v*4.3 + 80, seed+61, 3, 2.1, 0.5, 7.1);
      const isSea = h < SL;
      let r, g, b, sp = 0, em = 0;
      const tclim = 1 - Math.pow(latAbs, 1.65) - Math.max(0, (h-SL))*0.75 + (tvar-0.5)*0.22;
      const frozen = tclim < P.ice*0.92 - 0.06;
      if (isSea){
        const depth = clamp((SL-h)/Math.max(0.12, SL), 0, 1);
        if (P.lava){
          const crack = ridged(i/W*22, v*11, seed+91, 4, 22);
          const hot = clamp((crack-0.52)*3.2, 0, 1) * (0.35 + depth*0.65);
          r = 46 + hot*209; g = 12 + hot*96; b = 6 + hot*20;
          em = Math.pow(hot, 1.3)*255; sp = 26;
        } else if (frozen){
          const cr = ridged(i/W*26, v*13, seed+71, 3, 26);
          const br = 224 - depth*18 + cr*22;
          r = br*0.94; g = br*0.985; b = 255 - depth*10; sp = 64;
        } else {
          r = lerp(30, 8, depth); g = lerp(108, 26, depth); b = lerp(150, 72, depth);
          const shore = 1 - smoothstepJS(0, 0.055, SL-h);
          r = lerp(r, 66, shore*0.8); g = lerp(g, 168, shore*0.8); b = lerp(b, 172, shore*0.7);
          sp = 255;
        }
      } else {
        landmask[idx] = 1;
        const e = SL < 0 ? h : clamp((h-SL)/(1-SL), 0, 1.2);
        const vegHere = clamp(P.veg * (moist*1.25) * clamp(tclim+0.25,0,1) * (1 - smoothstepJS(0.42, 0.72, e)), 0, 1);
        if (P.lava){
          const bas = 26 + e*54 + tvar*14;
          r = bas*1.1; g = bas*0.92; b = bas*0.82;
          const crack = ridged(i/W*26, v*13, seed+95, 4, 26);
          if (crack > 0.66 && e < 0.5){ const cg = (crack-0.66)*2.9; r += cg*200; g += cg*70; em = cg*230; }
        } else {
          /* Sand → Vegetation → Fels → Schnee */
          const sandR = 202+tvar*22, sandG = 178+tvar*16, sandB = 132;
          const dryR = 176, dryG = 138, dryB = 92;
          let lr = lerp(sandR, dryR, clamp(1-moist*1.3,0,1)), lg = lerp(sandG, dryG, clamp(1-moist*1.3,0,1)), lb = lerp(sandB, dryB, clamp(1-moist*1.3,0,1));
          const gr = [56+tvar*18, 106+tvar*26, 44], fo = [24, 66, 30];
          lr = lerp(lr, lerp(gr[0], fo[0], vegHere), clamp(vegHere*1.5,0,1));
          lg = lerp(lg, lerp(gr[1], fo[1], vegHere), clamp(vegHere*1.5,0,1));
          lb = lerp(lb, lerp(gr[2], fo[2], vegHere), clamp(vegHere*1.5,0,1));
          const rockF = smoothstepJS(0.5, 0.78, e);
          lr = lerp(lr, 116+tvar*22, rockF); lg = lerp(lg, 102+tvar*18, rockF); lb = lerp(lb, 92+tvar*14, rockF);
          const snowF = smoothstepJS(0.78 - P.ice*0.32, 0.94 - P.ice*0.3, e + Math.pow(latAbs,1.6)*0.5*(0.4+P.ice));
          lr = lerp(lr, 240, snowF); lg = lerp(lg, 244, snowF); lb = lerp(lb, 250, snowF);
          if (frozen){ lr = lerp(lr, 232, 0.85); lg = lerp(lg, 238, 0.85); lb = lerp(lb, 246, 0.85); }
          r = lr; g = lg; b = lb;
          if (snowF > 0.5 || frozen) sp = 46;
        }
      }
      const grain = 0.95 + 0.1*hashN(i, j, seed+123);
      md[k] = clamp(r*grain,0,255); md[k+1] = clamp(g*grain,0,255); md[k+2] = clamp(b*grain,0,255); md[k+3] = 255;
      sd[k] = sd[k+1] = sd[k+2] = sp; sd[k+3] = 255;
      if (ed){ ed[k] = em; ed[k+1] = em*0.42; ed[k+2] = em*0.1; ed[k+3] = 255; }
    }
    if (onprog && (j & 63) === 0){ onprog(0.55 + j/H*0.35); await new Promise(r=>setTimeout(r)); }
  }
  mx.putImageData(mi, 0, 0); sx.putImageData(si, 0, 0);
  if (emis) emis.getContext('2d').putImageData(ei, 0, 0);

  /* --- Stadtlichter (Nachtseite) --- */
  let night = null;
  if (P.cities > 0.02 && !P.lava){
    night = mkCanvas(W,H); const nx = night.getContext('2d');
    nx.fillStyle = '#000'; nx.fillRect(0,0,W,H);
    const rnd = mulberry32(seed*17+29);
    const K = Math.round(P.cities*2600*(W/2048));
    let placed = 0, tries = 0;
    while (placed < K && tries < K*14){
      tries++;
      const u = rnd(), v = 0.06 + 0.88*rnd();
      const i = (u*W)|0, j = (v*H)|0, idx = j*W+i;
      if (!landmask[idx]) continue;
      const clus = fbm(u*6.5, v*3.6+7, seed+77, 3, 2.3, 0.5, 6.5);
      if (Math.pow(clus, 2.1) < rnd()*0.5) continue;
      const e = clamp((hgt[idx]-Math.max(0,SL))/(1-Math.max(0,SL)), 0, 1);
      if (e > 0.55) continue;
      placed++;
      const big = rnd() < 0.06;
      const rad = big ? 1.6 + rnd()*2.4 : 0.5 + rnd()*0.9;
      const al = big ? 0.9 : 0.4 + rnd()*0.5;
      const grd = nx.createRadialGradient(i, j, 0, i, j, rad*2.4);
      grd.addColorStop(0, `rgba(255,214,140,${al})`);
      grd.addColorStop(0.55, `rgba(255,180,90,${al*0.4})`);
      grd.addColorStop(1, 'rgba(255,160,60,0)');
      nx.fillStyle = grd; nx.beginPath(); nx.arc(i, j, rad*2.4, 0, TAU); nx.fill();
      if (big){ /* kleine Satellitenstädte */
        for (let s=0;s<5+rnd()*7;s++){
          const a2 = rnd()*TAU, dd = 3+rnd()*9;
          nx.fillStyle = `rgba(255,200,120,${0.25+rnd()*0.35})`;
          nx.beginPath(); nx.arc(i+Math.cos(a2)*dd, j+Math.sin(a2)*dd*0.6, 0.5+rnd()*0.7, 0, TAU); nx.fill();
        }
      }
    }
  }

  /* --- Normal-Map (Ozean glatt) --- */
  const hN = new Float32Array(W*H);
  for (let idx=0; idx<W*H; idx++) hN[idx] = SL > 0 ? Math.max(hgt[idx], SL) : hgt[idx];
  if (onprog){ onprog(0.93); await new Promise(r=>setTimeout(r)); }
  const normal = normalCanvasFromHeight(hN, W, H, 2.6);
  /* Höhenkarte (roh, für Meeresspiegel-Effekte im Shader) */
  const hc = mkCanvas(W, H), hx = hc.getContext('2d'), hi = hx.createImageData(W, H);
  for (let i=0;i<W*H;i++){ const v = clamp(hgt[i]/1.25, 0, 1)*255; hi.data[i*4]=v; hi.data[i*4+1]=v; hi.data[i*4+2]=v; hi.data[i*4+3]=255; }
  hx.putImageData(hi, 0, 0);
  if (onprog) onprog(1);
  return { map, normal, spec, night, emissive:emis, height:hc, seaBase: SL > 0 ? SL/1.25 : 0 };
}

/* ---------- Orbit-Kamera (eigene, ohne Addons) ---------- */
class OrbitCam {
  constructor(dom){
    this.dom = dom; this.target = new THREE.Vector3();
    this.theta = 0.6; this.phi = 1.25; this.r = 6;
    this.tTheta = 0.6; this.tPhi = 1.25; this.tR = 6;
    this.minR = 2; this.maxR = 100; this.enabled = true;
    this.onClick = null; this.vTheta = 0; this.vPhi = 0;
    this._ptr = new Map(); this._down = null; this._pinch0 = 0;
    dom.addEventListener('pointerdown', e => this._pd(e));
    dom.addEventListener('pointermove', e => this._pm(e));
    dom.addEventListener('pointerup', e => this._pu(e));
    dom.addEventListener('pointercancel', e => this._pu(e));
    dom.addEventListener('wheel', e => { if (!this.enabled) return; e.preventDefault();
      this.tR = clamp(this.tR * Math.exp(e.deltaY * 0.0011), this.minR, this.maxR); }, { passive:false });
  }
  _pd(e){ if (!this.enabled) return; this.dom.setPointerCapture(e.pointerId);
    this._ptr.set(e.pointerId, {x:e.clientX, y:e.clientY});
    if (this._ptr.size === 1) this._down = {x:e.clientX, y:e.clientY, t:performance.now(), moved:0};
    if (this._ptr.size === 2){ const p = [...this._ptr.values()]; this._pinch0 = Math.hypot(p[0].x-p[1].x, p[0].y-p[1].y) || 1; }
    this.dom.classList.add('grabbing'); }
  _pm(e){ if (!this._ptr.has(e.pointerId) || !this.enabled) return;
    const prev = this._ptr.get(e.pointerId);
    const dx = e.clientX - prev.x, dy = e.clientY - prev.y;
    this._ptr.set(e.pointerId, {x:e.clientX, y:e.clientY});
    if (this._down) this._down.moved += Math.abs(dx) + Math.abs(dy);
    if (this._ptr.size === 1){
      this.tTheta -= dx * 0.0052; this.tPhi = clamp(this.tPhi - dy * 0.0052, 0.04, Math.PI - 0.04);
    } else if (this._ptr.size === 2){
      const p = [...this._ptr.values()]; const d = Math.hypot(p[0].x-p[1].x, p[0].y-p[1].y) || 1;
      this.tR = clamp(this.tR * this._pinch0 / d, this.minR, this.maxR); this._pinch0 = d;
    } }
  _pu(e){ this._ptr.delete(e.pointerId);
    if (this._ptr.size === 0){
      this.dom.classList.remove('grabbing');
      if (this._down && this._down.moved < 7 && performance.now() - this._down.t < 420 && this.onClick) this.onClick(e);
      this._down = null;
    } }
  update(){
    const dmp = 0.14;
    this.theta += (this.tTheta - this.theta) * dmp;
    this.phi   += (this.tPhi - this.phi) * dmp;
    this.r     += (this.tR - this.r) * dmp;
    const sp = Math.sin(this.phi), x = this.r * sp * Math.sin(this.theta), z = this.r * sp * Math.cos(this.theta), y = this.r * Math.cos(this.phi);
    camera.position.set(this.target.x + x, this.target.y + y, this.target.z + z);
    camera.lookAt(this.target);
  }
  setView(theta, phi, r, imm=false){ this.tTheta = theta; this.tPhi = phi; this.tR = clamp(r, this.minR, this.maxR);
    if (imm){ this.theta = theta; this.phi = phi; this.r = this.tR; } }
}
const orbit = new OrbitCam(canvas);

/* ---------- GLSL-Bausteine ---------- */
const GLSL_NOISE = `
float pHash(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123); }
float pNoise(vec2 p){ vec2 i = floor(p), f = fract(p); vec2 u = f*f*(3.0-2.0*f);
  return mix(mix(pHash(i), pHash(i+vec2(1.,0.)), u.x), mix(pHash(i+vec2(0.,1.)), pHash(i+vec2(1.,1.)), u.x), u.y); }
float pFbm(vec2 p){ return 0.6*pNoise(p) + 0.28*pNoise(p*2.13) + 0.12*pNoise(p*4.7); }`;

const PLANET_VERT = `
varying vec2 vUv; varying vec3 vN; varying vec3 vWp; varying vec3 vT;
void main(){
  vUv = uv;
  vec4 wp = modelMatrix * vec4(position, 1.0);
  vWp = wp.xyz;
  vN = normalize(mat3(modelMatrix) * normal);
  float lon = uv.x * 6.28318530718;
  vT = normalize(mat3(modelMatrix) * vec3(sin(lon), 0.0, cos(lon)));
  gl_Position = projectionMatrix * viewMatrix * wp;
}`;

const PLANET_FRAG = `
precision highp float;
varying vec2 vUv; varying vec3 vN; varying vec3 vWp; varying vec3 vT;
uniform sampler2D map;
#ifdef HAS_NORMAL
uniform sampler2D normalMap; uniform float normalStrength;
#endif

uniform sampler2D specMap;
#endif

uniform sampler2D nightMap; uniform float nightBoost;
#endif
#ifdef HAS_EMIS
uniform sampler2D emisMap;
#endif
#ifdef HAS_COAST
uniform sampler2D coastMap;
#endif
#ifdef HAS_HEIGHT
uniform sampler2D heightMap; uniform float uSeaBase;
#endif
uniform vec3 sunPos[2]; uniform vec3 sunCol[2]; uniform int nSuns;
uniform vec3 ambientCol; uniform vec3 tint;
uniform vec3 atmoCol; uniform float atmoDen; uniform float detailAmp;
/* Klima */
uniform float uFreeze;    /* 0..1  Eisdecke wandert Richtung Äquator */

uniform float uMagma;     /* 0..1  Kruste reisst glühend auf */
uniform float uSeaShift;  /* -1..1 Meeresspiegel */
uniform float uNightLife; /* 0..1  Stadtlichter */
uniform float uTide;      /* Gezeitenstärke */
uniform vec3 uTideDir;    /* Richtung zum Mond */
uniform vec3 uCenter;     /* Planetenzentrum (Welt) */
uniform float uLocked;    /* gebundene Rotation: Glut-/Eisseite */
uniform float uAurora;    /* Polarlicht */
uniform float uTime;
${GLSL_NOISE}
void main(){
  vec3 n0 = normalize(vN);
  vec3 T = normalize(vT - n0 * dot(vT, n0));
  vec3 B = normalize(cross(n0, T));
  vec3 n = n0;
  #ifdef HAS_NORMAL
    vec3 nm = texture2D(normalMap, vUv).xyz * 2.0 - 1.0;
    nm.xy *= normalStrength;
    n = normalize(T * nm.x + B * nm.y + n0 * nm.z);
  #endif
  vec3 V = normalize(cameraPosition - vWp);
  vec3 alb = texture2D(map, vUv).rgb * tint;
  alb *= 1.0 + detailAmp * (pFbm(vUv * vec2(900.0, 450.0)) - 0.5);

  float lat = abs(vUv.y - 0.5) * 2.0;
  float nz = pFbm(vUv * vec2(24.0, 12.0));
  vec3 emisCol = vec3(0.0);

  /* Sonnenseite (für gebundene Rotation) */
  float sunFacing = dot(n0, normalize(sunPos[0] - vWp));
  float lockedFrost  = uLocked * smoothstep(-0.02, -0.5, sunFacing);
  float lockedScorch = uLocked * smoothstep(0.45, 0.92, sunFacing);

  /* Gezeitenwulst: Flutberge auf Mond- und Gegenseite, wandern mit dem Mond.
   * Stark herunterskaliert — echte Gezeiten sind aus dem All fast unsichtbar;
   * erst extreme Monde (gross + nah) fluten sichtbar die Küsten. */
  float tPsi = dot(normalize(vWp - uCenter), uTideDir);
  float tideOff = uTide * (1.5 * tPsi * tPsi - 0.5) * 0.5;
  float seaSh = uSeaShift + tideOff * 0.25;

  /* ---- Ozeanmaske ---- */
  float oceanM = 0.0;
  #ifdef HAS_SPEC
    oceanM = smoothstep(0.22, 0.6, texture2D(specMap, vUv).r);
  #endif

  /* ---- Meeresspiegel über Höhenkarte (Mars, Mond, eigener Planet) ---- */
  #ifdef HAS_HEIGHT
    float hgt = texture2D(heightMap, vUv).r;
    float sl = uSeaBase + seaSh * (uSeaBase > 0.01 ? 0.3 : 0.5);
    if (abs(seaSh) > 0.006){
      float wDepth = sl - hgt;
      float wMask = smoothstep(0.0, 0.012, wDepth);
      vec3 wCol = mix(vec3(0.12, 0.36, 0.40), vec3(0.015, 0.10, 0.24), clamp(wDepth * 7.5, 0.0, 1.0));
      /* trockengefallener Meeresboden */
      float drained = smoothstep(0.0, 0.01, hgt - sl) * smoothstep(0.014, 0.0, hgt - uSeaBase);
      alb = mix(alb, vec3(0.60, 0.53, 0.38) * (0.7 + 0.5 * pNoise(vUv * 80.0)), drained * 0.9);
      /* Uferstreifen + fruchtbares Grün am neuen Wasser */
      float shore = smoothstep(0.030, 0.004, abs(wDepth + 0.015)) * (1.0 - wMask);
      alb = mix(alb, vec3(0.56, 0.48, 0.34), shore * 0.5);
      float fertile = smoothstep(0.06, 0.008, -wDepth) * (1.0 - wMask) * step(0.0, seaSh);
      alb = mix(alb, vec3(0.15, 0.30, 0.10) * (0.65 + 0.7 * pNoise(vUv * 110.0)), fertile * uVeg * 0.85);
      alb = mix(alb, wCol, wMask);
      oceanM = max(oceanM, wMask);
    }
  #endif

  /* ---- Küsten fluten / austrocknen (Erde, über Küsten-Distanzkarte) ---- */
  #ifdef HAS_COAST
    float cst = texture2D(coastMap, vUv).r;
    if (seaSh > 0.006){
      float fl = smoothstep(0.5 + seaSh * 0.34, 0.492, cst) * (1.0 - oceanM);
      alb = mix(alb, vec3(0.07, 0.21, 0.30), fl * 0.93);
      oceanM = max(oceanM, fl);
    } else if (seaSh < -0.008){
      float dry = smoothstep(0.5 - abs(seaSh) * 0.42, 0.514, cst) * oceanM;
      dry = max(dry, clamp((abs(seaSh) - 0.72) * 3.6, 0.0, 1.0) * oceanM); /* Ozeane komplett verdampft */
      alb = mix(alb, vec3(0.64, 0.56, 0.40) * (0.72 + 0.5 * pNoise(vUv * 70.0)), dry * 0.95);
      oceanM *= 1.0 - dry * 0.97;
    }
  #endif

  /* ---- Vegetation verdorrt & stirbt ---- */
  float vegM = smoothstep(0.012, 0.085, alb.g - max(alb.r, alb.b * 0.92)) * (1.0 - oceanM);
  vec3 deadCol = vec3(0.40, 0.30, 0.17) * (dot(alb, vec3(0.9)) + 0.28);
  alb = mix(alb, deadCol, vegM * (1.0 - uVeg) * (0.6 + 0.4 * nz));
  /* Dürre: Land versandet grossflächig (inkl. Glutseite bei gebundener Rotation) */
  float droughtEff = clamp(uDrought + lockedScorch * 0.9, 0.0, 1.0);
  alb = mix(alb, vec3(0.58, 0.45, 0.28) * (0.55 + 0.7 * dot(alb, vec3(0.33))), droughtEff * 0.72 * (1.0 - oceanM));

  /* ---- Frost: wandernde Schnee-/Eisgrenze (+ Eisseite bei gebundener Rotation) ---- */
  float freezeEff = max(uFreeze, lockedFrost);
  float frost = smoothstep(-0.05, 0.15, lat - (1.0 - freezeEff * 1.55) + (nz - 0.5) * 0.26);
  frost = max(frost, lockedFrost * smoothstep(0.1, 0.55, -sunFacing));
  vec3 iceCol = vec3(0.82, 0.88, 0.95) * (0.88 + 0.24 * pNoise(vUv * vec2(64.0, 30.0)));
  alb = mix(alb, iceCol * 1.03, oceanM * frost);
  alb = mix(alb, iceCol, (1.0 - oceanM) * frost * 0.94);
  float oceanLiquid = oceanM * (1.0 - frost);

  /* ---- Magma: Kruste reisst auf ---- */
  if (uMagma > 0.002){
    float crack = pFbm(vUv * vec2(52.0, 26.0));
    alb = mix(alb, vec3(0.05, 0.038, 0.032), uMagma * 0.88);
    float glow = smoothstep(0.62 - uMagma * 0.2, 0.86, crack) * uMagma;
    emisCol += vec3(1.0, 0.30, 0.05) * glow * 2.4;
  }

  vec3 col = vec3(0.0);
  float dayAcc = 0.0;
  vec3 sunAvg = vec3(0.0);
  float sMask = oceanLiquid * 0.9 + frost * oceanM * 0.14;
  for (int i = 0; i < 2; i++){
    if (i >= nSuns) break;
    vec3 L = normalize(sunPos[i] - vWp);
    float ndl = dot(n, L), ndl0 = dot(n0, L);
    float tw = mix(0.03, 0.16, clamp(atmoDen * 0.5, 0.0, 1.0));
    float day = smoothstep(-tw, tw * 1.7, ndl0);
    dayAcc = max(dayAcc, day);
    vec3 lc = sunCol[i]; sunAvg += lc;
    float diff = pow(max(ndl, 0.0), 0.88);
    col += alb * lc * diff;
    float band = (1.0 - smoothstep(0.0, 0.24, abs(ndl0))) * day;
    col += alb * vec3(1.0, 0.42, 0.15) * band * atmoDen * 0.5 * max(lc, vec3(0.0));
    vec3 Hv = normalize(L + V);
    col += lc * pow(max(dot(n, Hv), 0.0), 88.0) * sMask * 0.85 * day;
  }
  float fres = pow(1.0 - max(dot(n0, V), 0.0), 2.7);
  col += atmoCol * fres * atmoDen * (0.08 + 0.5 * dayAcc) * (0.4 + 0.6 * clamp(sunAvg, 0.0, 1.0));
  #ifdef HAS_NIGHT
    vec3 nite = texture2D(nightMap, vUv).rgb;
    col += nite * vec3(1.0, 0.84, 0.6) * pow(1.0 - dayAcc, 1.7) * nightBoost * uNightLife;
  #endif
  /* ---- Polarlichter (Nachtseite, um die Pole) ---- */
  if (uAurora > 0.003){
    float night = pow(1.0 - dayAcc, 1.6);
    float wob1 = (pNoise(vec2(vUv.x * 6.0, uTime * 0.11)) - 0.5) * 0.13;
    float band1 = smoothstep(0.105, 0.02, abs(lat - 0.70 + wob1));
    float flick = 0.5 + 0.5 * pNoise(vUv * vec2(34.0, 9.0) + vec2(uTime * 0.4, uTime * 0.13));
    col += vec3(0.20, 1.0, 0.48) * band1 * flick * uAurora * night * 0.85;
    float wob2 = (pNoise(vec2(vUv.x * 5.0 + 7.0, uTime * 0.09)) - 0.5) * 0.11;
    float band2 = smoothstep(0.085, 0.012, abs(lat - 0.80 + wob2));
    col += vec3(0.5, 0.28, 0.95) * band2 * flick * uAurora * night * 0.4;
  }
  #ifdef HAS_EMIS
    col += texture2D(emisMap, vUv).rgb * (0.4 + 0.6 * (1.0 - dayAcc)) * 1.6;
  #endif
  col += emisCol * (0.5 + 0.5 * (1.0 - dayAcc));
  col += alb * ambientCol;
  gl_FragColor = vec4(col, 1.0);
}`;

const CLOUD_FRAG = `
precision highp float;
varying vec2 vUv; varying vec3 vN; varying vec3 vWp; varying vec3 vT;
uniform sampler2D map;
uniform vec3 sunPos[2]; uniform vec3 sunCol[2]; uniform int nSuns;
uniform vec3 ambientCol; uniform float covLo; uniform float covHi; uniform float texHasAlpha; uniform vec3 cloudTint;
void main(){
  vec3 n0 = normalize(vN);
  vec3 V = normalize(cameraPosition - vWp);
  vec4 tx = texture2D(map, vUv);
  float raw = mix(dot(tx.rgb, vec3(0.333)), tx.a, texHasAlpha);
  float a = smoothstep(covLo, covHi, raw);
  vec3 col = vec3(0.0);
  float dayAcc = 0.0;
  for (int i = 0; i < 2; i++){
    if (i >= nSuns) break;
    vec3 L = normalize(sunPos[i] - vWp);
    float ndl0 = dot(n0, L);
    float day = smoothstep(-0.06, 0.18, ndl0);
    dayAcc = max(dayAcc, day);
    col += vec3(1.0) * sunCol[i] * (pow(max(ndl0, 0.0), 0.75) * 0.96 + 0.04);
    float band = (1.0 - smoothstep(0.0, 0.2, abs(ndl0))) * day;
    col += vec3(1.0, 0.5, 0.22) * band * 0.35 * sunCol[i];
  }
  col += ambientCol * 1.6;
  float rim = pow(1.0 - max(dot(n0, V), 0.0), 2.0);
  a *= 1.0 - rim * 0.25;
  gl_FragColor = vec4(col * tx.rgb * cloudTint, a);
}`;

const ATMO_VERT = `
varying vec3 vN; varying vec3 vWp;
void main(){
  vec4 wp = modelMatrix * vec4(position, 1.0);
  vWp = wp.xyz; vN = normalize(mat3(modelMatrix) * normal);
  gl_Position = projectionMatrix * viewMatrix * wp;
}`;
const ATMO_FRAG = `
precision highp float;
varying vec3 vN; varying vec3 vWp;
uniform vec3 sunPos[2]; uniform vec3 sunCol[2]; uniform int nSuns;
uniform vec3 atmoCol; uniform float atmoDen;
void main(){
  vec3 n0 = normalize(vN);
  vec3 V = normalize(cameraPosition - vWp);
  float ang = 1.0 - abs(dot(n0, V));
  float glow = pow(ang, 3.4);
  float lit = 0.12;
  for (int i = 0; i < 2; i++){
    if (i >= nSuns) break;
    vec3 L = normalize(sunPos[i] - vWp);
    float sd = clamp(dot(n0, L) * 0.55 + 0.5, 0.0, 1.0);
    lit = max(lit, 0.035 + 0.965 * pow(sd, 1.9));
  }
  vec3 col = atmoCol * glow * lit * atmoDen * 1.3;
  gl_FragColor = vec4(col, clamp(glow * atmoDen, 0.0, 1.0));
}`;

const RING_VERT = `
varying vec2 vUv; varying vec3 vWp; varying vec3 vN;
void main(){
  vUv = uv;
  vec4 wp = modelMatrix * vec4(position, 1.0);
  vWp = wp.xyz; vN = normalize(mat3(modelMatrix) * normal);
  gl_Position = projectionMatrix * viewMatrix * wp;
}`;
const RING_FRAG = `
precision highp float;
varying vec2 vUv; varying vec3 vWp; varying vec3 vN;
uniform sampler2D map;
uniform vec3 sunPos[2]; uniform vec3 sunCol[2]; uniform int nSuns;
uniform vec3 planetPos; uniform float planetR;
uniform float ringOpacity; uniform vec3 ringTint; uniform vec3 ambientCol;
void main(){
  vec4 tx = texture2D(map, vec2(vUv.x, 0.5));
  float a = max(tx.a, 0.001) * ringOpacity;
  if (tx.a < 0.02 && dot(tx.rgb, vec3(1.0)) < 0.05) discard;
  vec3 n0 = normalize(vN);
  vec3 col = vec3(0.0);
  for (int i = 0; i < 2; i++){
    if (i >= nSuns) break;
    vec3 Ld = sunPos[i] - vWp;
    float dist = length(Ld);
    vec3 L = Ld / dist;
    float lit = 0.3 + 0.7 * abs(dot(n0, L));
    /* Schattenwurf des Planeten auf den Ring */
    vec3 pc = planetPos - vWp;
    float t = dot(pc, L);
    float sh = 1.0;
    if (t > 0.0 && t < dist){
      float d2 = dot(pc, pc) - t * t;
      sh = mix(0.12, 1.0, smoothstep(planetR * 0.92, planetR * 1.05, sqrt(max(d2, 0.0))));
    }
    col += tx.rgb * ringTint * sunCol[i] * lit * sh;
  }
  col += tx.rgb * ringTint * ambientCol;
  gl_FragColor = vec4(col, a);
}`;

const SUN_VERT = PLANET_VERT;
const SUN_FRAG = `
precision highp float;
varying vec2 vUv; varying vec3 vN; varying vec3 vWp;
uniform sampler2D map; uniform float time; uniform vec3 sunTint; uniform float activity;
${GLSL_NOISE}
void main(){
  vec3 n0 = normalize(vN);
  vec3 V = normalize(cameraPosition - vWp);
  vec2 uv = vUv + vec2(time * 0.0035, 0.0);
  vec2 w = vec2(pFbm(vUv * 9.0 + time * 0.05), pFbm(vUv * 9.0 - time * 0.045)) - 0.5;
  uv += w * 0.006 * activity;
  vec3 base = texture2D(map, uv).rgb;
  float gr = pFbm(vUv * vec2(60.0, 30.0) + w * 2.0 + time * 0.12);
  base *= 0.9 + 0.24 * gr * activity;
  float mu = max(dot(n0, V), 0.0);
  base *= 0.5 + 0.5 * pow(mu, 0.5);
  vec3 col = base * sunTint * 2.6 + sunTint * 0.3;
  col += sunTint * pow(1.0 - mu, 2.2) * 0.55;
  gl_FragColor = vec4(col, 1.0);
}`;

/* ---------- Material-Fabriken ---------- */
const allShaderMats = new Set();
function sunUniforms(){
  return {
    sunPos: { value: [new THREE.Vector3(0, 0, 0), new THREE.Vector3()] },
    sunCol: { value: [new THREE.Vector3(1, 1, 1), new THREE.Vector3()] },
    nSuns: { value: 1 },
    ambientCol: { value: new THREE.Vector3(0.016, 0.017, 0.02) },
  };
}
function mkPlanetMat(o){
  const defines = {};
  const uniforms = {
    map: { value: o.map }, tint: { value: new THREE.Vector3(1, 1, 1) },
    atmoCol: { value: new THREE.Vector3(0.4, 0.6, 1) }, atmoDen: { value: 0 },
    detailAmp: { value: 0 }, ...sunUniforms(),
    uFreeze: { value: 0 }, uVeg: { value: 1 }, uDrought: { value: 0 },
    uMagma: { value: 0 }, uSeaShift: { value: 0 }, uNightLife: { value: 1 },
    uTide: { value: 0 }, uTideDir: { value: new THREE.Vector3(0, 1, 0) },
    uCenter: { value: new THREE.Vector3() }, uLocked: { value: 0 },
    uAurora: { value: 0 }, uTime: { value: 0 },
  };
  if (o.normal){ defines.HAS_NORMAL = 1; uniforms.normalMap = { value: o.normal }; uniforms.normalStrength = { value: o.normalStrength ?? 1 }; }
  if (o.spec){ defines.HAS_SPEC = 1; uniforms.specMap = { value: o.spec }; }
  if (o.night){ defines.HAS_NIGHT = 1; uniforms.nightMap = { value: o.night }; uniforms.nightBoost = { value: 1.15 }; }
  if (o.emis){ defines.HAS_EMIS = 1; uniforms.emisMap = { value: o.emis }; }
  if (o.coast){ defines.HAS_COAST = 1; uniforms.coastMap = { value: o.coast }; }
  if (o.height){ defines.HAS_HEIGHT = 1; uniforms.heightMap = { value: o.height }; uniforms.uSeaBase = { value: o.seaBase || 0 }; }
  const m = new THREE.ShaderMaterial({ defines, uniforms, vertexShader: PLANET_VERT, fragmentShader: PLANET_FRAG });
  allShaderMats.add(m); return m;
}
function mkCloudMat(map, hasAlpha){
  const m = new THREE.ShaderMaterial({
    uniforms: { map: { value: map }, covLo: { value: 0.35 }, covHi: { value: 0.6 }, texHasAlpha: { value: hasAlpha ? 1 : 0 },
      cloudTint: { value: new THREE.Vector3(1, 1, 1) }, ...sunUniforms() },
    vertexShader: PLANET_VERT, fragmentShader: CLOUD_FRAG,
    transparent: true, depthWrite: false,
  });
  allShaderMats.add(m); return m;
}
function mkAtmoMat(){
  const m = new THREE.ShaderMaterial({
    uniforms: { atmoCol: { value: new THREE.Vector3(0.4, 0.6, 1) }, atmoDen: { value: 1 }, ...sunUniforms() },
    vertexShader: ATMO_VERT, fragmentShader: ATMO_FRAG,
    transparent: true, depthWrite: false, side: THREE.BackSide, blending: THREE.AdditiveBlending,
  });
  allShaderMats.add(m); return m;
}
function mkRingMat(map){
  const m = new THREE.ShaderMaterial({
    uniforms: { map: { value: map }, planetPos: { value: new THREE.Vector3() }, planetR: { value: 1 },
      ringOpacity: { value: 1 }, ringTint: { value: new THREE.Vector3(1, 1, 1) }, ...sunUniforms() },
    vertexShader: RING_VERT, fragmentShader: RING_FRAG,
    transparent: true, depthWrite: false, side: THREE.DoubleSide,
  });
  allShaderMats.add(m); return m;
}
function mkSunMat(map){
  const m = new THREE.ShaderMaterial({
    uniforms: { map: { value: map }, time: { value: 0 }, sunTint: { value: new THREE.Vector3(1, 0.93, 0.82) }, activity: { value: 1 } },
    vertexShader: SUN_VERT, fragmentShader: SUN_FRAG,
  });
  allShaderMats.add(m); return m;
}
/* Sonnen-Uniforms global setzen (pos in Weltkoordinaten der jeweiligen Szene) */
function pushSuns(scene, suns, ambient=0.017){
  scene.traverse(obj => {
    const m = obj.material;
    if (!m || !m.uniforms || !m.uniforms.sunPos) return;
    m.uniforms.nSuns.value = suns.length;
    for (let i = 0; i < 2; i++){
      const s = suns[Math.min(i, suns.length - 1)] || { pos: new THREE.Vector3(), col: new THREE.Vector3() };
      m.uniforms.sunPos.value[i].copy(suns[i] ? suns[i].pos : s.pos);
      m.uniforms.sunCol.value[i].copy(suns[i] ? suns[i].col : new THREE.Vector3());
    }
    if (m.uniforms.ambientCol) m.uniforms.ambientCol.value.setScalar(ambient);
  });
}

/* ---------- Sprite-Texturen (Glow, Ring-Marker) ---------- */
function glowTexture(inner='255,235,200', outer='255,140,40', size=256){
  const c = mkCanvas(size, size), x = c.getContext('2d');
  const g = x.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
  g.addColorStop(0, `rgba(${inner},1)`); g.addColorStop(0.25, `rgba(${inner},0.6)`);
  g.addColorStop(0.55, `rgba(${outer},0.22)`); g.addColorStop(1, `rgba(${outer},0)`);
  x.fillStyle = g; x.fillRect(0, 0, size, size);
  const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace; return t;
}
function ringMarkerTexture(){
  const c = mkCanvas(128, 128), x = c.getContext('2d');
  x.strokeStyle = 'rgba(255,255,255,0.9)'; x.lineWidth = 4;
  x.beginPath(); x.arc(64, 64, 52, 0, TAU); x.stroke();
  const t = new THREE.CanvasTexture(c); return t;
}
const TEX_GLOW_WARM = glowTexture();
const TEX_MARKER = ringMarkerTexture();

/* ---------- Sternenhimmel ---------- */
async function buildSky(scene){
  const milky = await TexMan.get('milky');
  if (milky){
    const sky = new THREE.Mesh(new THREE.SphereGeometry(4600, 48, 32),
      new THREE.MeshBasicMaterial({ map: milky, side: THREE.BackSide, depthWrite: false }));
    sky.material.color.setScalar(0.5);
    sky.renderOrder = -20; scene.add(sky);
  }
  const N = 3400, pos = new Float32Array(N * 3), col = new Float32Array(N * 3), rnd = mulberry32(4242);
  for (let i = 0; i < N; i++){
    const u = rnd() * TAU, v = Math.acos(2 * rnd() - 1), r = 4300;
    pos[i*3] = r * Math.sin(v) * Math.cos(u); pos[i*3+1] = r * Math.cos(v); pos[i*3+2] = r * Math.sin(v) * Math.sin(u);
    const m = rnd(); let cr = 1, cg = 1, cb = 1;
    if (m < 0.14){ cr = 1; cg = 0.78; cb = 0.6; } else if (m < 0.3){ cr = 0.72; cg = 0.82; cb = 1; }
    const br = 0.35 + Math.pow(rnd(), 2.6) * 0.65;
    col[i*3] = cr * br; col[i*3+1] = cg * br; col[i*3+2] = cb * br;
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  g.setAttribute('color', new THREE.BufferAttribute(col, 3));
  const stars = new THREE.Points(g, new THREE.PointsMaterial({ size: 1.7, sizeAttenuation: false, vertexColors: true,
    transparent: true, opacity: 0.95, depthWrite: false, blending: THREE.AdditiveBlending }));
  stars.renderOrder = -19; scene.add(stars);
}

/* ---------- Ring-Geometrie mit radialem UV ---------- */
function ringGeo(inner, outer){
  const g = new THREE.RingGeometry(inner, outer, 220, 6);
  const p = g.attributes.position, uv = g.attributes.uv;
  const v = new THREE.Vector3();
  for (let i = 0; i < p.count; i++){
    v.fromBufferAttribute(p, i);
    const t = (v.length() - inner) / (outer - inner);
    uv.setXY(i, t, 0.5);
  }
  return g;
}

/* ---------- Körper-Visual bauen ---------- */
function makeBodyVisual(opts){
  /* opts: {radius, seg, tex:{map, normal, spec, night, emis, cloud, cloudAlpha, ring}, atmo:{col,den}, cloud:{cov,spd}, rings:{on,inner,outer,opacity,hue}, isSun, tilt} */
  const group = new THREE.Group();
  const tiltG = new THREE.Group(); group.add(tiltG);
  const spinG = new THREE.Group(); tiltG.add(spinG);
  const seg = opts.seg || 96;
  const R = { group, tiltG, spinG, radius: opts.radius, spinSpeed: 0, cloudMesh: null, atmoMat: null, ringMat: null, ringMesh: null, surfMat: null, sunMat: null, coronas: [] };

  if (opts.isSun){
    R.sunMat = mkSunMat(opts.tex.map);
    const mesh = new THREE.Mesh(new THREE.SphereGeometry(1, seg, seg >> 1), R.sunMat);
    mesh.userData.bodyRef = R; spinG.add(mesh); R.surface = mesh;
    /* Korona-Sprites */
    const mk = (scale, op) => {
      const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: TEX_GLOW_WARM, transparent: true, opacity: op,
        blending: THREE.AdditiveBlending, depthWrite: false }));
      sp.scale.setScalar(scale); group.add(sp); R.coronas.push(sp); return sp;
    };
    mk(3.4, 0.75); mk(6.5, 0.32); mk(11, 0.13);
  } else {
    R.surfMat = mkPlanetMat({ map: opts.tex.map, normal: opts.tex.normal, spec: opts.tex.spec, night: opts.tex.night, emis: opts.tex.emis,
      coast: opts.tex.coast, height: opts.tex.height, seaBase: opts.tex.seaBase,
      normalStrength: opts.normalStrength });
    R.surfMat.uniforms.atmoCol.value.copy(cssToVec(opts.atmo?.col || '#6FA8FF'));
    R.surfMat.uniforms.atmoDen.value = opts.atmo?.den ?? 0;
    const mesh = new THREE.Mesh(new THREE.SphereGeometry(1, seg, seg >> 1), R.surfMat);
    mesh.userData.bodyRef = R; spinG.add(mesh); R.surface = mesh;
    if (opts.tex.cloud){
      const cm = mkCloudMat(opts.tex.cloud, opts.tex.cloudAlpha);
      const cmesh = new THREE.Mesh(new THREE.SphereGeometry(1.014, seg, seg >> 1), cm);
      cmesh.renderOrder = 2; tiltG.add(cmesh); R.cloudMesh = cmesh; R.cloudMat = cm;
      setCloudCoverage(cm, opts.cloud?.cov ?? 0.5);
    }
    if ((opts.atmo?.den ?? 0) > 0.001){
      R.atmoMat = mkAtmoMat();
      R.atmoMat.uniforms.atmoCol.value.copy(cssToVec(opts.atmo.col));
      R.atmoMat.uniforms.atmoDen.value = opts.atmo.den;
      const amesh = new THREE.Mesh(new THREE.SphereGeometry(1.055, seg, seg >> 1), R.atmoMat);
      amesh.renderOrder = 3; group.add(amesh); R.atmoMesh = amesh;
    } else {
      R.atmoMat = mkAtmoMat(); R.atmoMat.uniforms.atmoDen.value = 0;
      const amesh = new THREE.Mesh(new THREE.SphereGeometry(1.055, 48, 24), R.atmoMat);
      amesh.renderOrder = 3; amesh.visible = false; group.add(amesh); R.atmoMesh = amesh;
    }
    if (opts.rings && opts.tex.ring){
      R.ringMat = mkRingMat(opts.tex.ring);
      const rmesh = new THREE.Mesh(ringGeo(opts.rings.inner, opts.rings.outer), R.ringMat);
      rmesh.rotation.x = -Math.PI / 2; rmesh.renderOrder = 1;
      rmesh.visible = !!opts.rings.on;
      R.ringMat.uniforms.ringOpacity.value = opts.rings.opacity ?? 1;
      tiltG.add(rmesh); R.ringMesh = rmesh; R.ringInner = opts.rings.inner; R.ringOuter = opts.rings.outer;
    }
  }
  group.scale.setScalar(opts.radius);
  if (opts.tilt != null) tiltG.rotation.z = -opts.tilt * DEG;
  return R;
}
function setCloudCoverage(cloudMat, cov){
  /* cov 0..1 → Schwellen im Shader */
  const lo = lerp(0.72, 0.08, clamp(cov, 0, 1));
  cloudMat.uniforms.covLo.value = lo;
  cloudMat.uniforms.covHi.value = lo + 0.3;
  cloudMat.visible = cov > 0.005;
}
function cssToVec(hex){
  const c = new THREE.Color(hex);
  return new THREE.Vector3(c.r, c.g, c.b);
}
/* Ring-Geometrie live ersetzen */
function setRingSize(R, inner, outer){
  if (!R.ringMesh) return;

}

function uiSlider(parent, {label, min, max, step=0.01, value, fmt: fmtFn, onchange, log=false}){
  const row = el('div', 'row');
  const lr = el('div', 'lr'); const lb = el('label', null, label); const vv = el('span', 'val');
  lr.append(lb, vv);
  const inp = document.createElement('input'); inp.type = 'range';
  const toRaw = v => log ? (Math.log(v / min) / Math.log(max / min)) : v;
  const fromRaw = r => log ? (min * Math.pow(max / min, r)) : r;
  if (log){ inp.min = 0; inp.max = 1; inp.step = 0.0004; } else { inp.min = min; inp.max = max; inp.step = step; }
  const paint = () => { const p = log ? inp.value * 100 : ((inp.value - min) / (max - min) * 100); inp.style.setProperty('--fill', p + '%'); };
  const show = v => { vv.innerHTML = fmtFn ? fmtFn(v) : fmt(v, 2); };
  const api = { root: row, input: inp,
    get: () => fromRaw(parseFloat(inp.value)),
    set: (v, fire=false) => { inp.value = toRaw(clamp(v, min, max)); paint(); show(clamp(v, min, max)); if (fire) onchange && onchange(v); } };
  inp.addEventListener('input', () => { const v = fromRaw(parseFloat(inp.value)); paint(); show(v); onchange && onchange(v); });
  row.append(lr, inp); parent.appendChild(row);
  api.set(value); return api;
}

/* Labor-Parameter eines Körpers: Basis + gemerkte Edits */
function labParams(key){
  const b = BODIES[key];
  if (!LAB.edits[key]){
    LAB.edits[key] = {
      m: b.m, r: b.r, dayH: Math.abs(b.dayH), retro: b.dayH < 0, tilt: clamp(b.tilt, 0, 180),
      atmoDen: b.atmo?.den ?? 0, atmoHue: null,
