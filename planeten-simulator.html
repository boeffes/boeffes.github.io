/* ============================================================
 *  KLIMA-ENGINE — der Planet reagiert sichtbar auf die Physik
 * ============================================================ */
const LAB_AU = { merkur: 0.387, venus: 0.723, erde: 1, mond: 1, mars: 1.524, jupiter: 5.203,
  saturn: 9.537, uranus: 19.19, neptun: 30.07, pluto: 39.48, eigen: 1 };
const CLIM_SOLID = k => !['sonne', 'jupiter', 'saturn', 'uranus', 'neptun'].includes(k)
  && !(k === 'eigen' && LAB.world.type === 'gas');
const HAS_SEA_CTRL = k => ['erde', 'mars', 'mond', 'merkur'].includes(k) || (k === 'eigen' && LAB.world.type !== 'gas');

/* Temperaturmodell: Einstrahlung (Leuchtkraft/Distanz²) + Treibhaus (Atmosphärendichte²) */
function climTargetsRaw(dist, den, Lsun){
  const I = Lsun / Math.max(dist * dist, 1e-4);
  const T = (255 + 34 * den * den) * Math.pow(I, 0.25);
  const freeze = clamp((272 - T) / 42, 0, 1);
  const veg = clamp(1 - Math.abs(T - 291) / 27, 0, 1) * smoothstepJS(0.1, 0.42, den);
  const drought = clamp((T - 303) / 45, 0, 1);
  const seaAuto = -clamp((T - 330) / 90, 0, 1);
  const magma = clamp((T - 880) / 420, 0, 1);
  const night = clamp(1 - smoothstepJS(0.3, 0.75, freeze) - smoothstepJS(0.35, 0.85, drought) - magma * 2, 0, 1);
  const steam = clamp((T - 318) / 110, 0, 1) * smoothstepJS(0.4, 1.4, den) * (1 - clamp((T - 460) / 300, 0, 1) * 0.4);
  const cloudX = (1 - freeze * 0.6) * (1 - clamp((T - 400) / 260, 0, 1));
  return { T, I, freeze, veg, drought, seaAuto, magma, night, steam, cloudX };
}
/* Basiszustand des echten Körpers — Effekte zeigen nur die ABWEICHUNG davon */
const _climBase = {};
function climBase(key){
  if (!_climBase[key]){
    const def = BODIES[key];
    _climBase[key] = climTargetsRaw(LAB_AU[key] ?? 1, def.atmo?.den ?? 0, 1);
  }
  return _climBase[key];
}
function climTargets(key, P){
  const t = climTargetsRaw(P.dist, P.atmoDen, LAB.clim.Lsun);
  const b0 = climBase(key);
  return { ...t,
    freeze: clamp(t.freeze - b0.freeze, 0, 1),
    drought: clamp(t.drought - b0.drought, 0, 1),
    seaAuto: clamp(t.seaAuto - b0.seaAuto, -1, 0),
    magma: clamp(t.magma - b0.magma, 0, 1),
    veg: clamp(t.veg / Math.max(b0.veg, 0.15), 0, 1),
  };
}
const CLIM_NEUTRAL = { T: null, I: 1, freeze: 0, veg: 1, drought: 0, seaAuto: 0, magma: 0, night: 1, steam: 0, cloudX: 1 };

function climateTick(dt){
  const key = LAB.key, P = labParams(key), vis = LAB.vis;
  if (!vis || key === 'sonne') return;
  const on = P.climOn && CLIM_SOLID(key);
  const tg = on ? { ...climTargets(key, P) } : CLIM_NEUTRAL;
  if (on && LAB.inter.wobAmp > 4) tg.veg = Math.min(tg.veg, 0.45);   /* taumelnde Achse stresst das Leben */
  const st = LAB.clim.st;
  const ez = (k, tau) => { st[k] += (tg[k] - st[k]) * Math.min(1, dt / tau); };
  ez('freeze', 3.5); ez('veg', 5); ez('drought', 4); ez('magma', 1.8);
  ez('seaAuto', 3); ez('night', 2.5); ez('steam', 2.2); ez('cloudX', 2.5); ez('I', 1.2);
  if (tg.T != null) st.T = tg.T;
  const u = vis.surfMat && vis.surfMat.uniforms;
  if (u && u.uFreeze){
    u.uFreeze.value = st.freeze; u.uVeg.value = st.veg; u.uDrought.value = st.drought;
    u.uMagma.value = st.magma; u.uNightLife.value = st.night;
    u.uSeaShift.value = clamp(P.sea + (on ? st.seaAuto : 0), -1, 1);
  }
  if (vis.cloudMat){
    /* ohne Ozeane kaum Verdunstung ⇒ kaum Wolken */
    const dryF = 1 - clamp(-(P.sea + (on ? st.seaAuto : 0)), 0, 1) * 0.55;
    const covEff = clamp(P.cloudCov * st.cloudX * dryF + st.steam * 0.9, 0, 1);
    setCloudCoverage(vis.cloudMat, covEff);
    vis.cloudMesh.visible = covEff > 0.005;
    vis.cloudMat.uniforms.cloudTint.value.set(1 - st.steam * 0.02, 1 - st.steam * 0.08, 1 - st.steam * 0.22);
  }
  LAB.clim.uiT -= dt;
  if (LAB.clim.uiT <= 0){ LAB.clim.uiT = 0.4; climStatusUI(on); }
}
function climateSnap(){
  const key = LAB.key, P = labParams(key);
  const on = P.climOn && CLIM_SOLID(key) && key !== 'sonne';
  const tg = on ? climTargets(key, P) : CLIM_NEUTRAL;
  Object.assign(LAB.clim.st, tg, { T: tg.T ?? LAB.clim.st.T });
  climateTick(0.0001);
  interactionTick(99);   /* Wechselwirkungen sofort auf Zielzustand */
  climStatusUI(on);
}
function climStatusUI(on){
  const st = LAB.clim.st;
  const elT = document.getElementById('climT');
  if (elT) elT.textContent = on ? fmt(st.T - 273.15, 0) + ' °C' : '— (Simulation aus)';
  const icT = document.getElementById('icTemp');
  if (icT && on) icT.textContent = fmt(st.T - 273.15, 0) + ' °C';
  const tagsEl = document.getElementById('climTags');
  if (!tagsEl) return;
  const tags = [];
  const inter = LAB.inter;
  /* Physik-Wechselwirkungen (immer sichtbar) */
  if (inter.breakup > 0.5) tags.push(['tag bad', '⚠️ Rotation nahe der Zerreissgrenze']);
  if (inter.esc > 0.05) tags.push(['tag warn', '💨 Atmosphäre entweicht ins All']);
  if (inter.locked > 0.4) tags.push(['tag', '👁️ Gebundene Rotation: Glut- & Eisseite']);
  if (inter.wobAmp > 5) tags.push(['tag warn', '🌀 Achse taumelt — kein grosser Mond']);
  if (HAS_SEA_CTRL(LAB.key)){
    if (inter.tide > 0.11) tags.push(['tag', '🌊 Gewaltige Gezeiten']);
    else if (inter.tide < 0.02) tags.push(['tag', '🌊 Ozeane fast still — kaum Gezeiten']);
  }
  if (on){
    if (st.magma > 0.12) tags.push(['tag bad', '🌋 Kruste schmilzt']);
    else if (st.drought > 0.35) tags.push(['tag warn', '🏜️ Land verdorrt']);
    if (st.seaAuto < -0.18 || (LAB.edits[LAB.key]?.sea ?? 0) < -0.3) tags.push(['tag warn', '💧 Meere schwinden']);
    if (st.freeze > 0.55) tags.push(['tag cold', '❄️ Ozeane frieren zu']);
    else if (st.freeze > 0.16) tags.push(['tag cold', '🌨️ Es wird eisig']);
    if (st.veg < 0.3 && climBase(LAB.key).veg > 0.2) tags.push(['tag warn', '🍂 Vegetation stirbt']);
    if (st.night < 0.35 && LAB.key === 'erde') tags.push(['tag bad', '🌃 Die Städte erlöschen']);
    if (inter.aurora > 0.3) tags.push(['tag ok', '🌌 Polarlichter über der Nachtseite']);
    if (!tags.length && st.veg > 0.65 && st.freeze < 0.15 && st.drought < 0.15) tags.push(['tag ok', '🌱 Leben gedeiht']);
  }
  tagsEl.innerHTML = tags.slice(0, 5).map(t => `<span class="${t[0]}">${t[1]}</span>`).join('');
}

async function labTexturesFor(key){
  const def = BODIES[key];
  if (key === 'eigen'){
    const W = await genWorld(LAB.world, 1024);
    LAB.worldCanvases = W;
    return {
      map: TexMan._mk(W.map, { srgb: true }),
      normal: W.normal ? TexMan._mk(W.normal, {}) : null,
      spec: W.spec ? TexMan._mk(W.spec, {}) : null,
      night: W.night ? TexMan._mk(W.night, { srgb: true }) : null,
      emis: W.emissive ? TexMan._mk(W.emissive, { srgb: true }) : null,
      cloud: (LAB.world.type !== 'gas') ? (await TexMan.get('erdeClouds') || TexMan._mk(procClouds(LAB.world.seed, 0.5, 0).canvas, { srgb: true })) : null,
      cloudAlpha: true,
      ring: await TexMan.get('saturnRing'),
      height: W.height ? TexMan._mk(W.height, {}) : null,
      seaBase: W.seaBase || 0,
    };
  }
  const t = def.tex;
  const [map, normal, spec, night, cloud, ring, bump] = await Promise.all([
    t.map ? TexMan.get(t.map) : null,
    t.normal ? TexMan.get(t.normal) : null,
    t.spec ? TexMan.get(t.spec) : null,
    t.night ? TexMan.get(t.night) : null,
    t.cloud ? TexMan.get(t.cloud) : null,
    TexMan.get('saturnRing'),
    t.bump ? TexMan.get(t.bump) : null,
  ]);
  const coast = key === 'erde' ? await TexMan.getCoast('erdeSpec') : null;
  const height = t.bump && TexMan.cache.has(t.bump + ':height') ? await TexMan.cache.get(t.bump + ':height') : null;
  return { map, normal: normal || bump, spec, night,
    cloud, cloudAlpha: t.cloud === 'erdeClouds', ring,
    emis: null, coast, height, seaBase: 0 };
}

async function buildLabBody(){
  const my = ++LAB.building;
  const key = LAB.key, def = BODIES[key], P = labParams(key);
  const tex = await labTexturesFor(key);
  if (my !== LAB.building) return;   /* inzwischen umgeschaltet */
  /* alte Visuals raus */
  if (LAB.vis){ labScene.remove(LAB.vis.group); }
  LAB.moons = [];
  const isSun = key === 'sonne';
  const vis = makeBodyVisual({
    radius: 1, seg: 128, isSun,
    tex, atmo: def.atmo, cloud: def.cloud,
    rings: { on: P.ringsOn, inner: P.ringIn, outer: P.ringOut, opacity: P.ringOp },
    tilt: P.tilt, normalStrength: key === 'eigen' ? 1.15 : 0.9,
  });
  labScene.add(vis.group);
  LAB.vis = vis;
  /* Achsen-Linie */
  const ag = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, -1.7, 0), new THREE.Vector3(0, 1.7, 0)]);
  const axis = new THREE.Line(ag, new THREE.LineBasicMaterial({ color: 0xF97316, transparent: true, opacity: 0.55 }));
  axis.visible = LAB.view.axis; vis.tiltG.add(axis); LAB.axisLine = axis;
  /* Monde */
  rebuildLabMoons();
  applyLabParams();
  climateSnap();
  if (LAB.sunSprite) LAB.sunSprite.visible = !isSun;
  updateLabInfo();
}

async function rebuildLabMoons(){
  const P = labParams(LAB.key);
  if (!LAB.vis) return;
  for (const m of LAB.moons) LAB.vis.group.remove(m.pivot);
  LAB.moons = [];
  if (LAB.key === 'sonne') return;
  const mtex = await TexMan.get('mond');
  for (let i = 0; i < P.moons; i++){
    const pivot = new THREE.Group();
    pivot.rotation.x = (i % 2 ? 1 : -1) * (0.06 + i * 0.05);
    const mat = mkPlanetMat({ map: mtex });
    const rad = (0.085 + 0.035 * ((i * 2.7) % 1)) * P.moonSize;
    const mesh = new THREE.Mesh(new THREE.SphereGeometry(1, 40, 20), mat);
    mesh.scale.setScalar(rad);
    const dist = (2.1 + i * 0.85) * P.moonDist;
    mesh.position.x = dist;
    pivot.add(mesh); pivot.rotation.y = i * 2.4 + 0.9;
    LAB.vis.group.add(pivot);
    LAB.moons.push({ pivot, mesh, dist, spd: (0.5 / Math.pow(dist / 2.1, 1.5)) });
  }
}

function applyLabParams(){
  const key = LAB.key, P = labParams(key), vis = LAB.vis, def = BODIES[key];
  if (!vis) return;
  /* Rotation: Labor-Zeitraffer ~2600× → Erdtag ≈ 33 s */
  const spinRad = TAU / (P.dayH * 3600) * 2600 * (P.retro ? -1 : 1);
  vis.spinSpeed = clamp(spinRad, -1.6, 1.6);
  vis.tiltG.rotation.z = -P.tilt * DEG;
  if (vis.surfMat){
    const hue = P.atmoHue;
    const col = hue == null ? cssToVec(def.atmo?.col || '#6FA8FF') : cssToVec(hslCss(hue, 62, 66));
    vis.surfMat.uniforms.atmoCol.value.copy(col);
    vis.surfMat.uniforms.atmoDen.value = P.atmoDen;
    if (vis.surfMat.uniforms.nightBoost) vis.surfMat.uniforms.nightBoost.value = P.nightBoost;
    if (vis.atmoMat){
      vis.atmoMat.uniforms.atmoCol.value.copy(col);
      vis.atmoMat.uniforms.atmoDen.value = P.atmoDen;
      vis.atmoMesh.visible = P.atmoDen > 0.01;
    }
  }
  if (vis.cloudMat){
    setCloudCoverage(vis.cloudMat, P.cloudCov);
    vis.cloudMesh.visible = P.cloudCov > 0.005;
  }
  if (vis.ringMesh){
    vis.ringMesh.visible = P.ringsOn;
    if (Math.abs((vis.ringInner ?? 0) - P.ringIn) > 0.01 || Math.abs((vis.ringOuter ?? 0) - P.ringOut) > 0.01) setRingSize(vis, P.ringIn, P.ringOut);
    vis.ringMat.uniforms.ringOpacity.value = P.ringOp;
    const tintSets = [[1, 1, 1], [0.82, 0.66, 0.5], [0.45, 0.42, 0.4]];
    const t = tintSets[Math.round(P.ringHue * 2)] || tintSets[0];
    vis.ringMat.uniforms.ringTint.value.set(t[0], t[1], t[2]);
  }
  if (LAB.axisLine) LAB.axisLine.visible = LAB.view.axis;
  if (key === 'sonne' && vis.sunMat){
    const [r, g, b] = blackbody(LAB.sunStar.temp);
    vis.sunMat.uniforms.sunTint.value.set(r * 1.05, g * 1.05, b * 1.05);
    vis.sunMat.uniforms.activity.value = LAB.sunStar.act;
    const cCol = new THREE.Color(r, g, b);
    for (const c of vis.coronas) c.material.color.copy(cCol);
  }
}
function hslCss(h, s, l){ const c = new THREE.Color(); c.setHSL(((h % 360) + 360) % 360 / 360, s / 100, l / 100); return '#' + c.getHexString(); }

/* ============================================================
 *  WECHSELWIRKUNGEN — Gezeiten, Roche, Taumeln, Flucht, Abplattung
 * ============================================================ */
let labFlashes = [];
function labFlash(worldPos, base){
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: TEX_GLOW_WARM, transparent: true, opacity: 1,
    blending: THREE.AdditiveBlending, depthWrite: false }));
  sp.position.copy(worldPos); sp.scale.setScalar(base * 0.4);
  sp.userData = { t: 0, base };
  labScene.add(sp); labFlashes.push(sp);
}
let lastRoche = 0;
function updateMoonDists(){
  const P = labParams(LAB.key);
  LAB.moons.forEach((m, i) => {
    m.dist = (2.1 + i * 0.85) * P.moonDist;
    m.mesh.position.x = m.dist;
    m.spd = 0.5 / Math.pow(m.dist / 2.1, 1.5);
  });
}
function rocheBreak(){
  const P = labParams(LAB.key);
  if (P.moons <= 0 || performance.now() - lastRoche < 1400) return;
  lastRoche = performance.now();
  const wp = new THREE.Vector3();
  if (LAB.moons[0]) LAB.moons[0].mesh.getWorldPosition(wp);
  P.moons -= 1;
  P.ringsOn = true;
  P.ringIn = clamp(2.1 * P.moonDist * 0.8, 1.14, 2.2);
  P.ringOut = clamp(2.1 * P.moonDist * 1.4, P.ringIn + 0.3, 3.4);
  P.ringOp = Math.max(P.ringOp, 0.8); P.ringHue = 0.5;
  labFlash(wp, 2.4);
  rebuildLabMoons(); applyLabParams(); updateLabInfo();
  if (LAB.uiRefs.moonN) LAB.uiRefs.moonN.set(P.moons);
  if (LAB.uiRefs.ringsOn) LAB.uiRefs.ringsOn.set(true);
  toast('💥 <b>Roche-Grenze!</b> Die Gezeitenkräfte zerreissen deinen Mond — aus den Trümmern entsteht ein Ring.', 5200);
}
function interactionTick(dt){
  const key = LAB.key, vis = LAB.vis;
  if (!vis || key === 'sonne') return;
  const P = labParams(key);
  const inter = LAB.inter;
  const solid = CLIM_SOLID(key);
  const u = vis.surfMat && vis.surfMat.uniforms;
  if (!u || !u.uTide) return;
  u.uTime.value = simClock;

  /* --- Gezeiten: Stärke ∝ Mondmasse / Abstand³, Richtung folgt dem Mond --- */
  let tideT = 0.012;   /* schwache Sonnengezeiten */
  let dirSet = false;
  if (P.moons > 0 && LAB.moons.length){
    const s3 = Math.pow(P.moonSize, 3);
    for (const m of LAB.moons) tideT += 0.075 * s3 / Math.pow(Math.max(m.dist / 2.1, 0.22), 3);
    LAB.moons[0].mesh.getWorldPosition(_v2);
    if (_v2.lengthSq() > 1e-4){ u.uTideDir.value.copy(_v2.normalize()); dirSet = true; }
  }
  if (!dirSet) u.uTideDir.value.copy(labSunPos().normalize());
  tideT = Math.min(tideT, 0.4) * (solid ? 1 : 0);
  inter.tide += (tideT - inter.tide) * Math.min(1, dt / 1.2);
  u.uTide.value = inter.tide;

  /* --- Gebundene Rotation (sehr langer Tag ⇒ Glut-/Eisseite) --- */
  const lockT = solid && P.climOn ? smoothstepJS(700, 2400, P.dayH) : 0;
  inter.locked += (lockT - inter.locked) * Math.min(1, dt / 2.5);
  u.uLocked.value = inter.locked;

  /* --- Polarlichter: Atmosphäre + flotte Rotation + genug Masse (Magnetfeld) --- */
  const aurT = (P.atmoDen > 0.25 && Math.abs(P.dayH) < 420 && P.m > 0.2)
    ? clamp(0.3 + P.atmoDen * 0.35, 0, 0.95) : 0;
  inter.aurora += (aurT - inter.aurora) * Math.min(1, dt / 2);
  u.uAurora.value = inter.aurora * (1 - inter.locked * 0.6);

  /* --- Achstaumel ohne stabilisierenden Mond --- */
  const bigMoon = P.moons > 0 && P.moonSize >= 0.7;
  const wobT = (solid && P.climOn && !bigMoon && P.tilt < 130 && inter.locked < 0.5)
    ? Math.min(26, 8 + P.tilt * 0.8) : 0;
  inter.wobAmp += (wobT - inter.wobAmp) * Math.min(1, dt / 14);
  if (inter.wobAmp > 0.2){
    const w = inter.wobAmp * (0.6 * Math.sin(simClock * 0.12) + 0.4 * Math.sin(simClock * 0.053 + 2));
    vis.tiltG.rotation.z = -(P.tilt + w) * DEG;
  }

  /* --- Abplattung durch Rotation (+ Zerreissgrenze) --- */
  const om = TAU / (Math.max(P.dayH, 0.5) * 3600);
  const Rm = P.r * R_EARTH_KM * 1000, GMv = G_SI * P.m * M_EARTH;
  const q = om * om * Math.pow(Rm, 3) / GMv;
  inter.breakup = q;
  const fl = clamp(1.06 * q, 0, 0.42);
  const sy = 1 - fl;
  if (Math.abs(vis.surface.scale.y - sy) > 0.0025){
    vis.surface.scale.y = sy;
    if (vis.cloudMesh) vis.cloudMesh.scale.y = sy;
    if (vis.atmoMesh) vis.atmoMesh.scale.y = sy;
  }

  /* --- Jeans-Escape: kleine/heisse Welten verlieren ihre Atmosphäre --- */
  if (P.climOn && solid && P.atmoDen > 0.015){
    const vesc = escapeVelocity(P.m, P.r);
    const vth = 0.0298 * Math.sqrt(Math.max(LAB.clim.st.T, 30));
    inter.esc = 1 - smoothstepJS(3.5, 9.5, vesc / vth);
    if (inter.esc > 0.02){
      P.atmoDen = Math.max(0, P.atmoDen - Math.min(dt, 0.1) * 0.05 * inter.esc);
      inter.escT -= dt;
      if (inter.escT <= 0){
        inter.escT = 0.45;
        applyLabParams();
        if (LAB.uiRefs.atmoDen) LAB.uiRefs.atmoDen.set(P.atmoDen);
      }
    }
  } else inter.esc = 0;

  /* Blitze (Roche etc.) */
  for (let i = labFlashes.length - 1; i >= 0; i--){
    const sp = labFlashes[i];
    sp.userData.t += dt * 1.6;
    sp.scale.setScalar(sp.userData.base * (0.4 + sp.userData.t * 2.2));
    sp.material.opacity = Math.max(0, 1 - sp.userData.t);
    if (sp.userData.t >= 1){ labScene.remove(sp); labFlashes.splice(i, 1); }
  }
}

/* Labor-Weltdaten («Eigener Planet») neu generieren — debounced, 1024 → 2048 Upgrade */
let worldTimer = 0, worldHiTimer = 0, worldGen = 0;
function regenWorld(fast=true){
  clearTimeout(worldTimer); clearTimeout(worldHiTimer);
  worldTimer = setTimeout(async () => {
    const my = ++worldGen;
    const W = await genWorld(LAB.world, 1024);
    if (my !== worldGen || LAB.key !== 'eigen' || !LAB.vis) return;
    swapWorldTextures(W);
    worldHiTimer = setTimeout(async () => {
      const my2 = ++worldGen;
      const W2 = await genWorld(LAB.world, 2048);
      if (my2 !== worldGen || LAB.key !== 'eigen' || !LAB.vis) return;
      swapWorldTextures(W2);
    }, 1400);
  }, fast ? 320 : 60);
}
function swapWorldTextures(W){
  const vis = LAB.vis, u = vis.surfMat.uniforms;
  const rebuildNeeded = (!!u.emisMap) !== (!!W.emissive) || (!!u.nightMap) !== (!!W.night) || (!!u.normalMap) !== (!!W.normal)
    || (!!u.specMap) !== (!!W.spec) || (!!u.heightMap) !== (!!W.height);
  if (rebuildNeeded){ buildLabBody(); return; }
  u.map.value = TexMan._mk(W.map, { srgb: true });
  if (u.normalMap && W.normal) u.normalMap.value = TexMan._mk(W.normal, {});
  if (u.specMap && W.spec) u.specMap.value = TexMan._mk(W.spec, {});
  if (u.nightMap && W.night) u.nightMap.value = TexMan._mk(W.night, { srgb: true });
  if (u.emisMap && W.emissive) u.emisMap.value = TexMan._mk(W.emissive, { srgb: true });
  if (u.heightMap && W.height){ u.heightMap.value = TexMan._mk(W.height, {}); u.uSeaBase.value = W.seaBase || 0; }
}

/* Ultra (8K→4096) Texturen für aktuellen Körper */
async function applyUltra(){
  const key = LAB.key, def = BODIES[key];
  if (!LAB.view.ultra || key === 'eigen') return;
  const jobs = [];
  if (def.tex.map && ULTRA[def.tex.map]) jobs.push(['map', def.tex.map]);
  if (def.tex.night && ULTRA[def.tex.night]) jobs.push(['night', def.tex.night]);
  if (!jobs.length){ toast('Für diesen Körper gibt es keine 8K-Variante — Standard bleibt aktiv.'); return; }
  toast('Lade Ultra-Texturen …');
  let ok = 0;
  for (const [slot, name] of jobs){
    const t = await TexMan.getUltra(name);
    if (!t || LAB.key !== key || !LAB.view.ultra) continue;
    const u = LAB.vis?.surfMat?.uniforms || (LAB.vis?.sunMat?.uniforms);
    if (!u) continue;
    if (slot === 'map' && u.map){ u.map.value = t; ok++; }
    if (slot === 'night' && u.nightMap){ u.nightMap.value = t; ok++; }
  }
  if (ok) toast('Ultra-Texturen aktiv (' + ok + ' Karte' + (ok > 1 ? 'n' : '') + ', 4096 px).');
  else toast('Ultra-Quelle nicht erreichbar — Standard-Texturen bleiben aktiv.');
}

function starClass(T){
  return T < 3700 ? 'M-Zwerg' : T < 5200 ? 'K-Stern' : T < 6000 ? 'G-Stern (wie ☉)' : T < 7500 ? 'F-Stern'
    : T < 10000 ? 'A-Stern' : T < 30000 ? 'B-Stern' : 'O-Stern';
}
function fmtMass(mE){

  if (mE >= 1000) return fmt(mE / 317.8, 1) + ' M♃';
  return fmt(mE, mE < 1 ? 3 : 1) + ' M⊕';
}

const sysScene = new THREE.Scene();
/* Anzeige-Kompression: rDisp = K · rAU^P — hält Merkur sichtbar und Neptun im Bild */
const DM_K = 38, DM_P = 0.55;
const dmR = r => DM_K * Math.pow(Math.max(r, 1e-6), DM_P);
const dmInv = d => Math.pow(Math.max(d, 1e-6) / DM_K, 1 / DM_P);
function dispPos(v, out){
  const r = v.length();
  if (r < 1e-9){ out.set(0, 0, 0); return out; }
  const f = dmR(r) / r;
  out.set(v.x * f, v.y * f, v.z * f); return out;
}

const SYS = {
  bodies: [], nextId: 1,
  simYears: 0, epochMs: Date.now(), running: true, speed: 0.35,
  Gfac: 1, coll: 'fun',
  view: { orbits: true, trails: true, labels: true, hz: false, belts: true, realSize: false },
  sunMassFac: 1, autoTemp: true, tempOverride: 5772,
  focus: null, addMode: false, addMass: 'erde', addCircular: true,

};

/* Massen-Presets fürs Hinzufügen (in M☉ / Anzeige-Radius R⊕) */
const ADD_KINDS = {
  mond:      { t: '🌙 Mond', m: 0.0123 / M_SUN_E, rE: 0.27, kind: 'planet' },
  erde:      { t: '🌍 Erde', m: 1 / M_SUN_E, rE: 1, kind: 'planet' },
  supererde: { t: '🪨 Supererde', m: 4 / M_SUN_E, rE: 1.7, kind: 'planet' },
  neptunisch:{ t: '🔷 Neptun', m: 17 / M_SUN_E, rE: 3.9, kind: 'planet' },

function planetDispRadius(rE){ return clamp(0.85 + Math.log(1 + rE) * 1.5, 0.9, 6.8); }
function starDispRadius(m){ return clamp(6.5 * Math.pow(Math.max(m, 0.02), 0.38), 2.2, 15); }
function tempFromMass(m){ return clamp(5772 * Math.pow(Math.max(m, 0.02), 0.505), 2500, 28000); }
function lumFromMass(m){ return Math.pow(Math.max(m, 0.02), 3.5); }

/* ---------- Körper anlegen ---------- */
async function sysAddBody(cfg){
  /* cfg: {key?, name, em, kind, m, rE, pos[3] AU, vel[3] AU/yr, temp?, accent, texKey?, procKind?} */
  const b = {
    id: SYS.nextId++, key: cfg.key || null, name: cfg.name, em: cfg.em || '🪐', kind: cfg.kind,
    m: cfg.m, rE: cfg.rE, temp: cfg.temp || 5772,
    pos: new THREE.Vector3(...cfg.pos), vel: new THREE.Vector3(...cfg.vel),
    accent: cfg.accent || '#A2ADBB', alive: true,
    vis: null, trail: null, trailPts: [], ellipse: null, label: null,
    dPos: new THREE.Vector3(), lastTrailY: -1, massFac: 1, comet: null,
  };
  /* Visual */
  if (b.kind === 'star'){
    const map = await TexMan.get('sun');
    b.vis = makeBodyVisual({ radius: starDispRadius(b.m), seg: 64, isSun: true, tex: { map }, tilt: 0 });
    setStarLook(b);
  } else {
    let tex;
    const def = cfg.key ? BODIES[cfg.key] : null;
    if (def){
      const t = def.tex;
      const [map, night, spec, normal, cloud, ring, bump] = await Promise.all([
        TexMan.get(t.map), t.night ? TexMan.get(t.night) : null, t.spec ? TexMan.get(t.spec) : null,
        t.normal ? TexMan.get(t.normal) : null, t.cloud ? TexMan.get(t.cloud) : null,
        def.rings ? TexMan.get(t.ring || 'saturnRing') : null, t.bump ? TexMan.get(t.bump) : null,
      ]);
      const coast = cfg.key === 'erde' ? await TexMan.getCoast('erdeSpec') : null;
      tex = { map, night, spec, normal: normal || bump, cloud, cloudAlpha: t.cloud === 'erdeClouds', ring, coast };
      b.vis = makeBodyVisual({ radius: planetDispRadius(b.rE), seg: 72, tex,
        atmo: def.atmo, cloud: def.cloud, rings: def.rings ? { ...def.rings } : null, tilt: def.tilt, normalStrength: 0.75 });
      if (def.cloud) setCloudCoverage(b.vis.cloudMat, def.cloud.cov);
      b.vis.spinSpeed = clamp(TAU / (Math.abs(def.dayH) * 3600) * 9000, 0.02, 1.2) * (def.dayH < 0 ? -1 : 1);
      /* Kosmetischer Erdmond */
      if (def.hasMoon){
        const mm = await TexMan.get('mond');
        const pv = new THREE.Group();
        const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.3, 28, 14), mkPlanetMat({ map: mm }));
        mesh.position.x = 2.6; pv.add(mesh); pv.rotation.x = 0.1;
        b.vis.group.add(pv); b.moonPivot = pv;
      }
    } else {
      const pool = cfg.procKind === 'gas' ? SYS.procPool.gas : SYS.procPool.rock;
      const c = pool.length ? pool[(b.id * 7) % pool.length] : null;
      const map = c ? TexMan._mk(c.canvas, { srgb: true }) : await TexMan.get('mond');
      tex = { map, normal: c && c.normal ? TexMan._mk(c.normal, {}) : null };
      b.vis = makeBodyVisual({ radius: planetDispRadius(b.rE), seg: 56, tex,
        atmo: { col: '#9FB8D8', den: cfg.procKind === 'gas' ? 0.6 : 0.25 }, tilt: Math.random() * 30, normalStrength: 0.8 });
      b.vis.spinSpeed = 0.25;
    }
  }
  sysScene.add(b.vis.group);
  /* Spur */
  const tg = new THREE.BufferGeometry();
  tg.setAttribute('position', new THREE.BufferAttribute(new Float32Array(960 * 3), 3));
  tg.setAttribute('color', new THREE.BufferAttribute(new Float32Array(960 * 3), 3));
  b.trail = new THREE.Line(tg, new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.9,
    blending: THREE.AdditiveBlending, depthWrite: false }));
  b.trail.frustumCulled = false; b.trail.renderOrder = -3;
  sysScene.add(b.trail);
  /* Oskulierende Bahn */
  const eg = new THREE.BufferGeometry();
  eg.setAttribute('position', new THREE.BufferAttribute(new Float32Array(141 * 3), 3));
  b.ellipse = new THREE.Line(eg, new THREE.LineBasicMaterial({ color: new THREE.Color(b.accent), transparent: true, opacity: 0.3, depthWrite: false }));
  b.ellipse.frustumCulled = false; b.ellipse.renderOrder = -4; b.ellipse.visible = b.kind !== 'star';
  sysScene.add(b.ellipse);
  /* Label */
  b.label = sysLabels.add(b.name, '', v => v.copy(b.dPos).y += (b.vis?.group.scale.x || 1) * 0.4, () => focusBody(b), b.accent);
  SYS.bodies.push(b);
  return b;
}

function setStarLook(b){
  const T = SYS.autoTemp ? tempFromMass(b.m) : SYS.tempOverride;
  b.temp = T;
  const [r, g, bl] = blackbody(T);
  if (b.vis.sunMat){ b.vis.sunMat.uniforms.sunTint.value.set(r * 1.06, g * 1.06, bl * 1.06); }
  const cc = new THREE.Color(r, g, bl);
  for (const c of b.vis.coronas) c.material.color.copy(cc);
  b.vis.group.scale.setScalar(SYS.view.realSize ? Math.max(0.18, 0.00465 * Math.pow(b.m, 0.8) * DM_K) : starDispRadius(b.m));
}

function removeBody(b, silent=false){
  b.alive = false;
  const i = SYS.bodies.indexOf(b); if (i >= 0) SYS.bodies.splice(i, 1);
  if (b.vis) sysScene.remove(b.vis.group);
  if (b.trail) sysScene.remove(b.trail);
  if (b.ellipse) sysScene.remove(b.ellipse);
  if (b.label){ b.label.d.remove(); const j = sysLabels.items.indexOf(b.label); if (j >= 0) sysLabels.items.splice(j, 1); }
  if (b.comet){ sysScene.remove(b.comet.pts); sysScene.remove(b.comet.dust); sysScene.remove(b.comet.coma); }
  if (SYS.focus === b){ SYS.focus = null; hideSysInfo(); }
  if (!silent) updateSysCounts();
}

/* ---------- Startsysteme ---------- */
async function initSys(preset){
  SYS.preset = preset;
  for (const b of [...SYS.bodies]) removeBody(b, true);
  SYS.bodies = []; SYS.simYears = 0; SYS.focus = null; hideSysInfo();
  SYS.epochMs = Date.now();
  const jd = julianNow();
  const mkStar = (m, pos, vel, name='Sonne') => sysAddBody({ name, em: '☀️', kind: 'star', m, rE: 109, pos, vel, accent: '#FFC24D' });
  const circVel = (r, mu) => Math.sqrt(mu / r);

  if (preset === 'doppelstern'){
    const m1 = 0.8, m2 = 0.55, d = 0.32, mt = m1 + m2;
    const r1 = d * m2 / mt, r2 = d * m1 / mt;
    const vOrb = Math.sqrt(MU0 * mt / d);
    await mkStar(m1, [-r1, 0, 0], [0, 0, -vOrb * m2 / mt], 'Stern A');
    await mkStar(m2, [r2, 0, 0], [0, 0, vOrb * m1 / mt], 'Stern B');
    SYS.sunMassFac = 1;
    for (const key of ['mars', 'jupiter', 'saturn', 'uranus', 'neptun']){
      const def = BODIES[key], st = stateFromElements(key, jd);
      const r = Math.hypot(st.pos[0], st.pos[2]);
      const ang = Math.atan2(st.pos[0], st.pos[2]);
      const v = circVel(r, MU0 * mt);
      await sysAddBody({ key, name: def.name, em: def.em, kind: 'planet', m: MASS_SUN[key] , rE: def.r,
        pos: [Math.sin(ang) * r, 0, Math.cos(ang) * r], vel: [Math.cos(ang) * v, 0, -Math.sin(ang) * v], accent: def.accent });
    }
  } else if (preset === 'chaos'){
    await mkStar(1, [0, 0, 0], [0, 0, 0]);
    const rnd = mulberry32((Date.now() / 1000) | 0);
    for (let i = 0; i < 12; i++){
      const kinds = ['mond', 'erde', 'erde', 'supererde', 'neptunisch', 'jupiter'];
      const K = ADD_KINDS[kinds[(rnd() * kinds.length) | 0]];
      const r = 0.35 + rnd() * 9, ang = rnd() * TAU;
      const v = circVel(r, MU0) * (0.55 + rnd() * 0.85);
      const dir = rnd() < 0.85 ? 1 : -1;
      await sysAddBody({ name: 'Planet ' + (i + 1), em: '🪐', kind: 'planet', m: K.m, rE: K.rE,
        pos: [Math.sin(ang) * r, (rnd() - 0.5) * 0.3, Math.cos(ang) * r],
        vel: [Math.cos(ang) * v * dir, (rnd() - 0.5) * 0.4, -Math.sin(ang) * v * dir],
        procKind: K.m > 10 / M_SUN_E ? 'gas' : 'rock', accent: '#9FB8D8' });
    }
  } else if (preset === 'leer'){
    await mkStar(1, [0, 0, 0], [0, 0, 0]);
  } else {
    /* Unser Sonnensystem — echte Positionen von heute (bzw. Kreisbahnen bei verändertem Stern) */
    let mSun = 1;
    if (preset === 'roterZwerg') mSun = 0.22;
    if (preset === 'blauerRiese') mSun = 2.6;
    if (preset === 'sonneX2') mSun = 2;
    const circular = (preset === 'roterZwerg' || preset === 'blauerRiese');
    await mkStar(mSun, [0, 0, 0], [0, 0, 0]);
    SYS.sunMassFac = mSun;
    for (const key of SYS_ORDER){
      const def = BODIES[key];
      const st = stateFromElements(key, jd);
      let pos = st.pos, vel = st.vel;
      if (circular){
        const r = Math.hypot(st.pos[0], st.pos[2]);
        const ang = Math.atan2(st.pos[0], st.pos[2]);
        const v = circVel(r, MU0 * mSun);
        pos = [Math.sin(ang) * r, st.pos[1], Math.cos(ang) * r];
        vel = [Math.cos(ang) * v, 0, -Math.sin(ang) * v];
      }
      await sysAddBody({ key, name: def.name, em: def.em, kind: 'planet', m: MASS_SUN[key], rE: def.r, pos, vel, accent: def.accent });
    }
    /* Impulsausgleich: Sonne driftet nicht */
    const star = SYS.bodies.find(x => x.kind === 'star');
    let px = 0, py = 0, pz = 0;
    for (const b of SYS.bodies) if (b !== star){ px += b.m * b.vel.x; py += b.m * b.vel.y; pz += b.m * b.vel.z; }
    star.vel.set(-px / star.m, -py / star.m, -pz / star.m);
  }
  for (const s of SYS.bodies.filter(x => x.kind === 'star')) setStarLook(s);
  refreshHZ(); updateBeltUniforms(); updateSysCounts();
  SYS.inited = true;
}

/* ---------- Physik: Velocity-Verlet ---------- */
/*PHYSICS2-BEGIN*/
function computeAccels(bodies, G, acc){
  const n = bodies.length, EPS = 1e-8;
  for (let i = 0; i < n * 3; i++) acc[i] = 0;
  for (let i = 0; i < n; i++){
    const bi = bodies[i];
    for (let j = i + 1; j < n; j++){
      const bj = bodies[j];
      const dx = bj.pos.x - bi.pos.x, dy = bj.pos.y - bi.pos.y, dz = bj.pos.z - bi.pos.z;
      const d2 = dx * dx + dy * dy + dz * dz + EPS;
      const inv = 1 / (d2 * Math.sqrt(d2));
      const fi = G * bj.m * inv, fj = G * bi.m * inv;
      acc[i * 3] += dx * fi; acc[i * 3 + 1] += dy * fi; acc[i * 3 + 2] += dz * fi;
      acc[j * 3] -= dx * fj; acc[j * 3 + 1] -= dy * fj; acc[j * 3 + 2] -= dz * fj;
    }
  }
}
function verletSteps(bodies, G, dt, hMax, accA, accB){
  const n = bodies.length;
  let steps = Math.ceil(dt / hMax); if (steps > 420) steps = 420;
  const h = dt / steps;
  computeAccels(bodies, G, accA);
  for (let s = 0; s < steps; s++){
    for (let i = 0; i < n; i++){
      const b = bodies[i];
      b.vel.x += accA[i * 3] * h * 0.5; b.vel.y += accA[i * 3 + 1] * h * 0.5; b.vel.z += accA[i * 3 + 2] * h * 0.5;
      b.pos.x += b.vel.x * h; b.pos.y += b.vel.y * h; b.pos.z += b.vel.z * h;
    }
    computeAccels(bodies, G, accB);
    for (let i = 0; i < n; i++){
      const b = bodies[i];
      b.vel.x += accB[i * 3] * h * 0.5; b.vel.y += accB[i * 3 + 1] * h * 0.5; b.vel.z += accB[i * 3 + 2] * h * 0.5;
    }
    for (let i = 0; i < n * 3; i++) accA[i] = accB[i];
  }
  return h * steps;
}
/*PHYSICS2-END*/
const ACC_A = new Float64Array(3 * 64), ACC_B = new Float64Array(3 * 64);

function stepPhysics(realDt){
  if (!SYS.running || !SYS.bodies.length) return 0;
  const dt = clamp(realDt, 0, 0.06) * SYS.speed;
  if (dt <= 0) return 0;
  /* Adaptiver Maximalschritt: nahe Begegnungen fein auflösen */
  let rmin = 1e9;
  const stars = SYS.bodies.filter(b => b.kind === 'star');
  for (const b of SYS.bodies){
    if (b.kind === 'star') continue;
    for (const s of stars){ const d = b.pos.distanceTo(s.pos); if (d < rmin) rmin = d; }
  }
  let hMax = 0.0022;
  if (rmin < 0.3) hMax = 0.0006;
  if (rmin < 0.08) hMax = 0.00018;
  const done = verletSteps(SYS.bodies, MU0 * SYS.Gfac, dt, hMax, ACC_A, ACC_B);
  SYS.simYears += done;
  if (SYS.coll !== 'off') checkCollisions();
  return done;
}

function collRadiusAU(b){
  const physAU = b.kind === 'star' ? 0.00465 * Math.pow(b.m, 0.8) : b.rE * R_EARTH_KM / AU_KM;
  return SYS.coll === 'real' ? physAU * 1.2 : physAU * (b.kind === 'star' ? 2.2 : 260);
}
function checkCollisions(){
  for (let i = 0; i < SYS.bodies.length; i++){
    for (let j = i + 1; j < SYS.bodies.length; j++){
      const a = SYS.bodies[i], c = SYS.bodies[j];
      if (!a.alive || !c.alive) continue;
      const d = a.pos.distanceTo(c.pos);
      if (d < collRadiusAU(a) + collRadiusAU(c)){
        const big = (a.m >= c.m) ? a : c, small = (a.m >= c.m) ? c : a;
        /* Impulserhaltung */
        const mt = big.m + small.m;
        big.vel.multiplyScalar(big.m / mt).addScaledVector(small.vel, small.m / mt);
        big.pos.multiplyScalar(big.m / mt).addScaledVector(small.pos, small.m / mt);
        big.m = mt;
        if (big.kind === 'planet'){
          big.rE = Math.cbrt(Math.pow(big.rE, 3) + Math.pow(small.rE, 3));
          if (!SYS.view.realSize) big.vis.group.scale.setScalar(planetDispRadius(big.rE));
        } else { setStarLook(big); refreshHZ(); }
        collisionFlash(big);
        toast(`💥 <b>${small.name}</b> ist mit <b>${big.name}</b> verschmolzen.`);
        removeBody(small);
        return; /* pro Frame max. eine Kollision */
      }
    }
  }
}
let flashSprites = [];
function collisionFlash(b){
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: TEX_GLOW_WARM, transparent: true, opacity: 1,
    blending: THREE.AdditiveBlending, depthWrite: false }));
  sp.position.copy(b.dPos); sp.scale.setScalar(1);
  sp.userData = { t: 0, base: (b.vis?.group.scale.x || 1) * 6 };
  sysScene.add(sp); flashSprites.push(sp);
}

/* ---------- Habitable Zone ---------- */
function totalLum(){ let L = 0; for (const b of SYS.bodies) if (b.kind === 'star') L += lumFromMass(b.m); return L; }
function refreshHZ(){
  if (SYS.hzMesh){ sysScene.remove(SYS.hzMesh); SYS.hzMesh.geometry.dispose(); SYS.hzMesh = null; }
  const L = totalLum(); if (L <= 0) return;
  const rIn = Math.sqrt(L / 1.11), rOut = Math.sqrt(L / 0.53);
  const g = ringGeo(dmR(rIn), dmR(rOut));
  const m = new THREE.ShaderMaterial({
    uniforms: {},
    vertexShader: `varying vec2 vUv; void main(){ vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
    fragmentShader: `varying vec2 vUv; void main(){
      float t = vUv.x;
      float a = smoothstep(0.0, 0.3, t) * (1.0 - smoothstep(0.7, 1.0, t));
      gl_FragColor = vec4(0.2, 0.83, 0.6, a * 0.14); }`,
    transparent: true, depthWrite: false, side: THREE.DoubleSide, blending: THREE.AdditiveBlending,
  });
  SYS.hzMesh = new THREE.Mesh(g, m);
  SYS.hzMesh.rotation.x = -Math.PI / 2; SYS.hzMesh.renderOrder = -6;
  SYS.hzMesh.visible = SYS.view.hz;
  sysScene.add(SYS.hzMesh);
  SYS.hzIn = rIn; SYS.hzOut = rOut;
}

/* ---------- Gürtel (GPU-Punkte auf Keplerbahnen) ---------- */
function buildBelt(n, a0, a1, ySpread, size, col1, col2, seed){
  const aA = new Float32Array(n), ph = new Float32Array(n), yy = new Float32Array(n), sz = new Float32Array(n), mixv = new Float32Array(n);
  const rnd = mulberry32(seed);
  for (let i = 0; i < n; i++){
    aA[i] = a0 + (a1 - a0) * Math.pow(rnd(), 0.85);
    ph[i] = rnd() * TAU;
    yy[i] = (rnd() - 0.5) * ySpread;
    sz[i] = size * (0.5 + rnd());
    mixv[i] = rnd();
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(new Float32Array(n * 3), 3)); /* Dummy */
  g.setAttribute('aA', new THREE.BufferAttribute(aA, 1));
  g.setAttribute('aPh', new THREE.BufferAttribute(ph, 1));
  g.setAttribute('aY', new THREE.BufferAttribute(yy, 1));
  g.setAttribute('aSz', new THREE.BufferAttribute(sz, 1));
  g.setAttribute('aMix', new THREE.BufferAttribute(mixv, 1));
  const m = new THREE.ShaderMaterial({
    uniforms: { uT: { value: 0 }, uMsun: { value: 1 }, uC1: { value: new THREE.Color(col1) }, uC2: { value: new THREE.Color(col2) } },
    vertexShader: `
      attribute float aA; attribute float aPh; attribute float aY; attribute float aSz; attribute float aMix;
      uniform float uT; uniform float uMsun; varying float vMix;
      void main(){
        vMix = aMix;
        float nMot = 6.28318530718 * sqrt(max(uMsun, 0.001) / (aA * aA * aA));
        float ang = aPh + uT * nMot;
        float r = ${DM_K.toFixed(1)} * pow(aA, ${DM_P});
        vec3 p = vec3(sin(ang) * r, aY, cos(ang) * r);
        vec4 mv = modelViewMatrix * vec4(p, 1.0);
        gl_PointSize = aSz * clamp(300.0 / -mv.z, 0.55, 4.6);
        gl_Position = projectionMatrix * mv;
      }`,
    fragmentShader: `
      varying float vMix; uniform vec3 uC1; uniform vec3 uC2;
      void main(){
        vec2 c = gl_PointCoord - 0.5;
        float d = length(c);
        if (d > 0.5) discard;
        float a = smoothstep(0.5, 0.12, d) * 0.72;
        gl_FragColor = vec4(mix(uC1, uC2, vMix), a);
      }`,
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
  });
  const pts = new THREE.Points(g, m);
  pts.frustumCulled = false; pts.renderOrder = -7;
  sysScene.add(pts); SYS.belts.push(pts);
}
function updateBeltUniforms(){
  const mSum = SYS.bodies.filter(b => b.kind === 'star').reduce((s, b) => s + b.m, 0) * SYS.Gfac;
  for (const p of SYS.belts){
    p.material.uniforms.uMsun.value = Math.max(mSum, 0.001);
    p.material.uniforms.uT.value = SYS.simYears;
    p.visible = SYS.view.belts;
  }
}

/* ---------- Komet + Vagabundstern ---------- */
async function spawnComet(){
  if (SYS.bodies.length > 30) return toast('Maximale Objektzahl erreicht.');
  const rnd = mulberry32((Math.random() * 1e9) | 0);
  const aC = 17.8, eC = 0.967;
  const rStart = 4.6;
  let E = -Math.acos(clamp((1 - rStart / aC) / eC, -1, 1)); /* einlaufend */
  const mu = MU0 * SYS.Gfac * Math.max(totStarMass(), 0.05);
  const xp = aC * (Math.cos(E) - eC), yp = aC * Math.sqrt(1 - eC * eC) * Math.sin(E);
  const rr = aC * (1 - eC * Math.cos(E));
  const f = Math.sqrt(mu * aC) / rr;
  const vxp = -f * Math.sin(E), vyp = f * Math.sqrt(1 - eC * eC) * Math.cos(E);
  const om = rnd() * TAU, inc = (18 + rnd() * 30) * DEG, w = rnd() * TAU;
  const cw = Math.cos(w), sw = Math.sin(w), cO = Math.cos(om), sO = Math.sin(om), ci = Math.cos(inc), si = Math.sin(inc);
  const R = [[cw * cO - sw * sO * ci, -sw * cO - cw * sO * ci], [cw * sO + sw * cO * ci, -sw * sO + cw * cO * ci], [sw * si, cw * si]];
  const pos = [R[0][0] * xp + R[0][1] * yp, R[2][0] * xp + R[2][1] * yp, -(R[1][0] * xp + R[1][1] * yp)];
  const vel = [R[0][0] * vxp + R[0][1] * vyp, R[2][0] * vxp + R[2][1] * vyp, -(R[1][0] * vxp + R[1][1] * vyp)];
  const b = await sysAddBody({ name: 'Komet ' + String.fromCharCode(65 + (SYS.nextId % 26)), em: '☄️', kind: 'planet',
    m: 1e-13, rE: 0.05, pos, vel, accent: '#9FD8FF' });
  b.isComet = true;
  b.vis.group.scale.setScalar(0.42);
  /* Schweif-Partikel */
  const N = 320;
  const pg = new THREE.BufferGeometry();
  pg.setAttribute('position', new THREE.BufferAttribute(new Float32Array(N * 3), 3));
  pg.setAttribute('color', new THREE.BufferAttribute(new Float32Array(N * 3), 3));
  const pm = new THREE.PointsMaterial({ size: 2.6, sizeAttenuation: false, vertexColors: true, transparent: true,
    opacity: 0.85, depthWrite: false, blending: THREE.AdditiveBlending });
  const pts = new THREE.Points(pg, pm); pts.frustumCulled = false; sysScene.add(pts);
  const dust = pts.clone(); dust.material = pm.clone(); dust.material.size = 3.4; dust.material.opacity = 0.45;
  dust.geometry = pg.clone(); sysScene.add(dust);
  const coma = new THREE.Sprite(new THREE.SpriteMaterial({ map: TEX_GLOW_WARM, color: 0xbfe4ff, transparent: true,
    opacity: 0.8, blending: THREE.AdditiveBlending, depthWrite: false }));
  sysScene.add(coma);
  b.comet = { pts, dust, coma, parts: [], dparts: [], head: 0 };
  toast('☄️ Ein Komet stürzt Richtung Sonne — beobachte, wie sein Schweif wächst.');
  focusBody(b);
}
function totStarMass(){ return SYS.bodies.filter(b => b.kind === 'star').reduce((s, b) => s + b.m, 0); }

async function spawnRogue(){
  if (SYS.bodies.some(b => b.isRogue)) return toast('Der Vagabund ist schon unterwegs …');
  const ang = Math.random() * TAU;
  const r0 = 52;
  const pos = [Math.sin(ang) * r0, 2.5, Math.cos(ang) * r0];
  /* zielt knapp an der Sonne vorbei */
  const aim = new THREE.Vector3(-Math.sin(ang + 0.09) * 3.5, 0, -Math.cos(ang + 0.09) * 3.5);
  const dir = aim.sub(new THREE.Vector3(...pos)).normalize();
  const v = 2.35;
  const b = await sysAddBody({ name: 'Vagabund', em: '💫', kind: 'star', m: 0.85, rE: 80,
    pos, vel: [dir.x * v, dir.y * v, dir.z * v], accent: '#FF9F6B', temp: 4100 });
  b.isRogue = true;
  SYS.autoTempRogue = true; setStarLook(b); refreshHZ();
  toast('💫 <b>Ein Vagabundstern dringt ins System ein.</b> Seine Gravitation wird Bahnen verbiegen — gut möglich, dass Planeten hinausgeschleudert werden.', 5200);
}

let markerSprite = null;
function ensureMarker(){
  if (markerSprite) return;
  markerSprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: TEX_MARKER, color: 0xFDBA74, transparent: true,
    opacity: 0.85, depthWrite: false }));
  markerSprite.visible = false; sysScene.add(markerSprite);
}
function focusBody(b){
  ensureMarker();
  SYS.focus = b;
  markerSprite.visible = true;
  const sc = b.vis?.group.scale.x || 1;
  orbit.minR = Math.max(1.6, sc * 2.6);
  if (orbit.tR < orbit.minR) orbit.tR = orbit.minR * 2.2;
  const want = Math.max(orbit.minR * 3.4, sc * 12);
  if (orbit.tR > want * 2.4) orbit.tR = want;
  for (const it of sysLabels.items) it.d.classList.toggle('sel', it === b.label);
  buildSysInfo(b);
}
function unfocus(){
  SYS.focus = null;
  if (markerSprite) markerSprite.visible = false;
  for (const it of sysLabels.items) it.d.classList.remove('sel');
  orbit.minR = 9;
  hideSysInfo();
}
function pickAtScreen(x, y){
  const v = new THREE.Vector3();
  let best = null, bestD = 30;
  for (const b of SYS.bodies){
    v.copy(b.dPos).project(camera);
    if (v.z > 1) continue;
    const sx = (v.x * 0.5 + 0.5) * window.innerWidth, sy = (-v.y * 0.5 + 0.5) * window.innerHeight;
    const d = Math.hypot(sx - x, sy - y);
    const grab = 16 + (b.vis?.group.scale.x || 1) * 5;
    if (d < Math.max(bestD, grab) && d < Math.max(30, grab)){ best = b; bestD = d; }
  }
  return best;
}

  ms.style.setProperty('--fill', (ms.value * 100) + '%');
  ms.addEventListener('input', () => {
    const f = MMIN * Math.pow(MMAX / MMIN, parseFloat(ms.value));
    b.m = b.baseM * f;
    ms.style.setProperty('--fill', (ms.value * 100) + '%');
    q('[data-mf]').textContent = fmt(f, f < 0.3 ? 2 : 1) + '×';

function updateSysInfo(force=false){
  if (!sysInfoRefs || !sysInfoRefs.b.alive) return;
  const { b, q } = sysInfoRefs;
  /* Bezugsstern: massegewichtetes Zentrum aller Sterne */
  const stars = SYS.bodies.filter(x => x.kind === 'star');
  let mS = 0; const cp = new THREE.Vector3(), cv = new THREE.Vector3();
  for (const s of stars){ mS += s.m; cp.addScaledVector(s.pos, s.m); cv.addScaledVector(s.vel, s.m); }
  if (mS > 0){ cp.divideScalar(mS); cv.divideScalar(mS); }
  const rel = b.pos.clone().sub(cp), relV = b.vel.clone().sub(cv);
  const r = rel.length(), vKms = b.vel.length() * AUYR_KMS;
  q('[data-r]').textContent = b.kind === 'star' && stars.length === 1 ? '—' : fmt(r, r < 10 ? 2 : 1) + ' AE';
  q('[data-v]').textContent = fmt(vKms, 1) + ' km/s';
  const tags = [];
  if (b.kind !== 'star' && mS > 0){
    const mu = MU0 * SYS.Gfac * mS;
    const osc = osculating(rel.x, rel.y, rel.z, relV.x, relV.y, relV.z, mu);
    if (osc.eps >= 0){
      q('[data-ae]').textContent = 'hyperbolisch · e ' + fmt(osc.e, 2);
      q('[data-p]').textContent = '∞';
      tags.push('<span class="tag bad">🚀 Auf Fluchtkurs — verlässt das System!</span>');
    } else {
      const P = Math.pow(osc.a, 1.5) / Math.sqrt(SYS.Gfac * mS);
      q('[data-ae]').textContent = fmt(osc.a, osc.a < 10 ? 2 : 1) + ' AE · ' + fmt(osc.e, 2);
      q('[data-p]').textContent = P < 1 ? fmt(P * 365.25, 0) + ' Tage' : fmt(P, P < 20 ? 1 : 0) + ' Jahre';
      const qPeri = osc.a * (1 - osc.e);
      if (qPeri < 0.03) tags.push('<span class="tag bad">☄️ Sturzkurs auf die Sonne</span>');
      else if (osc.e > 0.45) tags.push('<span class="tag warn">Stark exzentrische Bahn</span>');
    }
    const L = totalLum();
    const Teq = 255 * Math.pow(L, 0.25) / Math.sqrt(Math.max(r, 0.01)) - 273;
    q('[data-t]').textContent = fmt(Teq, 0) + ' °C';
    if (SYS.hzIn && r >= SYS.hzIn && r <= SYS.hzOut && osc.eps < 0) tags.push('<span class="tag ok">🌱 In der habitablen Zone</span>');
    else if (Teq > 90) tags.push('<span class="tag warn">🔥 Zu heiss für flüssiges Wasser</span>');
    else if (Teq < -110) tags.push('<span class="tag cold">❄️ Tiefgefroren</span>');
  } else {
    q('[data-ae]').textContent = '—';
    q('[data-p]').textContent = '—';
    q('[data-t]').textContent = fmt(b.temp, 0) + ' K';
    tags.push(`<span class="tag">Leuchtkraft ${fmt(lumFromMass(b.m), lumFromMass(b.m) < 3 ? 2 : 0)} L☉</span>`);
    tags.push(`<span class="tag">${starClass(b.temp)}</span>`);
  }
  q('[data-m]').textContent = b.kind === 'star' ? fmt(b.m, 2) + ' M☉' : fmtMass(b.m * M_SUN_E);
  q('[data-tags]').innerHTML = tags.join('');
}

let addDrag = null, addPreview = null;
function toggleAddMode(force){
  SYS.addMode = force != null ? force : !SYS.addMode;

function removeAddPreview(){
  if (addPreview){ sysScene.remove(addPreview.line, addPreview.ell); addPreview = null; }
  addDrag = null;
}
function planeHit(e){
  const nx = (e.clientX / window.innerWidth) * 2 - 1, ny = -(e.clientY / window.innerHeight) * 2 + 1;
  const rc = new THREE.Raycaster();
  rc.setFromCamera(new THREE.Vector2(nx, ny), camera);
  const t = -rc.ray.origin.y / rc.ray.direction.y;
  if (!isFinite(t) || t < 0) return null;
  return rc.ray.origin.clone().addScaledVector(rc.ray.direction, t);
}
canvas.addEventListener('pointerdown', e => {
  if (MODE !== 'sys' || !SYS.addMode) return;
  const hit = planeHit(e); if (!hit) return;
  const rDisp = hit.length();
  const rAU = dmInv(rDisp);
  if (rAU < 0.06 || rAU > 95){ toast('Zu nah an der Sonne bzw. zu weit draussen.'); return; }
  const posAU = hit.clone().normalize().multiplyScalar(rAU);
  addDrag = { posAU, startDisp: hit.clone() };
  const lg = new THREE.BufferGeometry().setFromPoints([hit, hit]);
  const line = new THREE.Line(lg, new THREE.LineBasicMaterial({ color: 0xFDBA74, transparent: true, opacity: 0.9 }));
  const eg = new THREE.BufferGeometry();
  eg.setAttribute('position', new THREE.BufferAttribute(new Float32Array(141 * 3), 3));
  const ell = new THREE.Line(eg, new THREE.LineDashedMaterial({ color: 0xFDBA74, dashSize: 2.2, gapSize: 1.6, transparent: true, opacity: 0.75 }));
  ell.frustumCulled = false;
  sysScene.add(line, ell);
  addPreview = { line, ell };
  updateAddPreview(e);
});
canvas.addEventListener('pointermove', e => { if (addDrag) updateAddPreview(e); });
canvas.addEventListener('pointerup', async e => {
  if (!addDrag) return;
  const { posAU, velAU } = computeAddState(e);
  const K = ADD_KINDS[SYS.addMass];
  removeAddPreview();
  if (SYS.bodies.length >= 32){ toast('Maximal 32 Objekte — entferne zuerst etwas.'); return; }
  const n = SYS.bodies.filter(b => !b.key && b.kind === K.kind && !b.isComet && !b.isRogue).length + 1;
  const b = await sysAddBody({
    name: (K.kind === 'star' ? 'Stern ' : 'Planet ') + n, em: K.kind === 'star' ? '⭐' : (K.m > 10 / M_SUN_E ? '🟠' : '🪨'),
    kind: K.kind, m: K.m, rE: K.rE, pos: [posAU.x, posAU.y, posAU.z], vel: [velAU.x, velAU.y, velAU.z],
    procKind: K.m > 10 / M_SUN_E ? 'gas' : 'rock', accent: K.kind === 'star' ? '#FFD08A' : '#9FB8D8',
  });
  if (K.kind === 'star'){ setStarLook(b); refreshHZ(); updateBeltUniforms(); }
  updateSysCounts();
});
function computeAddState(e){
  const cur = planeHit(e) || addDrag.startDisp;
  const posAU = addDrag.posAU;
  const mu = MU0 * SYS.Gfac * Math.max(totStarMass(), 0.02);
  let velAU;
  if (SYS.addCircular){
    const rad = posAU.clone().normalize();
    const tan = new THREE.Vector3(rad.z, 0, -rad.x);
    velAU = tan.multiplyScalar(Math.sqrt(mu / Math.max(posAU.length(), 0.05)));
  } else {
    const drag = cur.clone().sub(addDrag.startDisp);
    velAU = drag.multiplyScalar(0.16);
    velAU.y = clamp(velAU.y, -1.5, 1.5);
  }
  return { posAU, velAU, cur };
}
function updateAddPreview(e){
  const { posAU, velAU, cur } = computeAddState(e);
  const lp = addPreview.line.geometry.attributes.position;
  lp.setXYZ(0, addDrag.startDisp.x, addDrag.startDisp.y, addDrag.startDisp.z);
  lp.setXYZ(1, cur.x, cur.y, cur.z); lp.needsUpdate = true;
  /* Bahnvorschau */
  const stars = SYS.bodies.filter(x => x.kind === 'star');
  let mS = 0; const cp = new THREE.Vector3();
  for (const s of stars){ mS += s.m; cp.addScaledVector(s.pos, s.m); }
  if (mS > 0) cp.divideScalar(mS);
  const rel = posAU.clone().sub(cp);
  const mu = MU0 * SYS.Gfac * Math.max(mS, 0.02);
  writeOrbitLine(addPreview.ell.geometry, rel, velAU, mu, cp);
  addPreview.ell.computeLineDistances();
}
/* Oskulierende Bahn in eine Line-Geometrie schreiben (141 Punkte) */
function writeOrbitLine(geo, rel, relV, mu, center){
  const osc = osculating(rel.x, rel.y, rel.z, relV.x, relV.y, relV.z, mu);
  const pos = geo.attributes.position;
  const tmp = new THREE.Vector3();
  let count = 0;
  if (!isFinite(osc.e)){ geo.setDrawRange(0, 0); return; }
  const open = osc.eps >= 0;
  const thMax = open ? Math.acos(clamp(-1 / Math.max(osc.e, 1.0001), -1, 1)) - 0.12 : Math.PI;
  for (let k = 0; k <= 140; k++){
    const th = open ? (-thMax + (2 * thMax) * k / 140) : (-Math.PI + TAU * k / 140);
    const rr = osc.p / (1 + osc.e * Math.cos(th));
    if (rr <= 0 || rr > 400) continue;
    const x = center.x + (osc.ex * Math.cos(th) + osc.qx * Math.sin(th)) * rr;
    const y = center.y + (osc.ey * Math.cos(th) + osc.qy * Math.sin(th)) * rr;
    const z = center.z + (osc.ez * Math.cos(th) + osc.qz * Math.sin(th)) * rr;
    tmp.set(x, y, z);
    dispPos(tmp, tmp);
    pos.setXYZ(count++, tmp.x, tmp.y, tmp.z);
  }
  geo.setDrawRange(0, count);
  pos.needsUpdate = true;
}

let MODE = 'lab';
let simClock = 0, ellTimer = 0, infoTimer = 0, labelTimer = 0;
const _v1 = new THREE.Vector3(), _v2 = new THREE.Vector3(), _c1 = new THREE.Color();

function labTick(dt){
  if (LAB.sun.auto) LAB.sun.az = (LAB.sun.az + dt * 6) % 360;
  const sp = labSunPos();
  if (LAB.sunSprite){ LAB.sunSprite.position.copy(sp); }
  const isSun = LAB.key === 'sonne';
  climateTick(dt);
  interactionTick(dt);
  const Pc = LAB.edits[LAB.key];
  const climLight = !isSun && Pc && Pc.climOn && CLIM_SOLID(LAB.key);
  const bright = climLight ? clamp(Math.pow(Math.max(LAB.clim.st.I, 1e-4), 0.45), 0.16, 2.6) : LAB.sun.int;
  const suns = [{ pos: sp, col: _v1.set(1, 0.965, 0.93).multiplyScalar(isSun ? 0 : bright * 1.25) }];
  pushSuns(labScene, suns, isSun ? 0.0 : 0.02);
  const vis = LAB.vis;
  if (vis){
    vis.spinG.rotation.y += (vis.spinSpeed || 0) * dt;
    if (vis.cloudMesh){
      const P = labParams(LAB.key);
      vis.cloudMesh.rotation.y += ((vis.spinSpeed || 0.06) * 0.34 * P.cloudSpd + 0.004) * dt * 60 * 0.016;
    }
    if (vis.sunMat){ vis.sunMat.uniforms.time.value += dt; }
    if (vis.surfMat) vis.surfMat.uniforms.detailAmp.value = clamp((3.2 - orbit.r) / 1.7, 0, 1) * 0.17;
  }
  const P0 = LAB.edits[LAB.key];
  for (const m of LAB.moons) m.pivot.rotation.y += m.spd * (P0 ? P0.moonSpd : 1) * dt;
  if (LAB.view.autorot) orbit.tTheta += dt * 0.055;
}

const _tv = new THREE.Vector3();
function sampleTrails(){
  for (const b of SYS.bodies){
    dispPos(b.pos, _tv);
    const tp = b.trailPts;
    const last = tp.length ? tp[tp.length - 1] : null;
    if (!last || Math.hypot(_tv.x - last[0], _tv.y - last[1], _tv.z - last[2]) > 0.22){
      tp.push([_tv.x, _tv.y, _tv.z]);
      if (tp.length > 940) tp.shift();
      b.trailDirty = true;
    }
  }
}
function sysTick(dt, t){
  /* Physik in Häppchen — so bleiben Spuren auch im Zeitraffer glatt */
  const CH = clamp(Math.ceil((dt * SYS.speed) / 0.012), 1, 14);
  for (let c = 0; c < CH; c++){
    stepPhysics(dt / CH);
    if (SYS.view.trails && SYS.running) sampleTrails();
  }
  const stars = SYS.bodies.filter(b => b.kind === 'star');
  /* Displaypositionen + Visuals */
  for (const b of SYS.bodies){
    dispPos(b.pos, b.dPos);
    b.vis.group.position.copy(b.dPos);
    if (b.vis.spinG) b.vis.spinG.rotation.y += (b.vis.spinSpeed || 0) * dt;
    if (b.vis.cloudMesh) b.vis.cloudMesh.rotation.y += 0.015 * dt;
    if (b.moonPivot) b.moonPivot.rotation.y += 0.9 * dt;
    if (b.vis.sunMat) b.vis.sunMat.uniforms.time.value += dt;
    if (b.kind === 'star'){
      const k = 1 + 0.025 * Math.sin(t * 1.6 + b.id);
      for (let i = 0; i < b.vis.coronas.length; i++) b.vis.coronas[i].scale.setScalar([3.4, 6.5, 11][i] * k);
    }
    if (b.comet) cometTick(b, dt, stars);
  }
  /* Beleuchtung pro Körper (Distanz-Abnahme in AU) */
  const L = totalLum();
  for (const b of SYS.bodies){
    if (b.kind === 'star') continue;
    let n = 0;
    b.vis.group.traverse(o => {
      const u = o.material && o.material.uniforms;
      if (!u || !u.sunPos) return;
      u.nSuns.value = Math.min(stars.length, 2);
      for (let i = 0; i < 2; i++){
        const s = stars[i];
        if (!s){ u.sunCol.value[i].set(0, 0, 0); continue; }
        const rAU = Math.max(b.pos.distanceTo(s.pos), 0.05);
        const Ls = lumFromMass(s.m);
        const bright = clamp(1.75 * Ls / Math.pow(rAU, 1.35), 0.06, 2.6);
        u.sunPos.value[i].copy(s.dPos);
        const tint = s.vis.sunMat ? s.vis.sunMat.uniforms.sunTint.value : _v1.set(1, 0.95, 0.9);
        u.sunCol.value[i].set(tint.x, tint.y, tint.z).multiplyScalar(bright / Math.max(tint.x, 0.4));
      }
      if (stars.length === 0){ u.nSuns.value = 0; if (u.ambientCol) u.ambientCol.value.setScalar(0.16); }
      else if (u.ambientCol) u.ambientCol.value.setScalar(0.018);
      if (u.planetPos){ u.planetPos.value.copy(b.dPos); u.planetR.value = b.vis.group.scale.x; }
    });
    /* Die Erde reagiert sichtbar aufs Klima — auch hier im System */
    if (b.key === 'erde' && b.vis.surfMat){
      let Isum = 0;
      for (const s of stars){ const rr = Math.max(b.pos.distanceTo(s.pos), 0.05); Isum += lumFromMass(s.m) / (rr * rr); }
      const T = (255 + 34) * Math.pow(Math.max(Isum, 1e-6), 0.25);
      b.clim ||= { freeze: 0, veg: 1, night: 1, drought: 0, magma: 0, boil: 0 };
      const c = b.clim;
      const tgF = clamp((272 - T) / 42, 0, 1), tgD = clamp((T - 303) / 45, 0, 1), tgM = clamp((T - 880) / 420, 0, 1);
      const tgV = clamp(1 - Math.abs(T - 291) / 27, 0, 1);
      const tgN = clamp(1 - smoothstepJS(0.3, 0.75, tgF) - smoothstepJS(0.35, 0.85, tgD) - tgM * 2, 0, 1);
      const tgB = clamp((T - 330) / 90, 0, 1);
      const ez = (k, tg, tau) => { c[k] += (tg - c[k]) * Math.min(1, dt / tau); };
      ez('freeze', tgF, 2.2); ez('veg', tgV, 3); ez('night', tgN, 2); ez('drought', tgD, 2.5); ez('magma', tgM, 1.6); ez('boil', tgB, 2.6);
      const u = b.vis.surfMat.uniforms;
      if (u.uFreeze){
        u.uFreeze.value = c.freeze; u.uVeg.value = c.veg; u.uNightLife.value = c.night;
        u.uDrought.value = c.drought; u.uMagma.value = c.magma; u.uSeaShift.value = -c.boil * 0.8;
        u.uAurora.value = 0.55 * c.night * (1 - c.freeze * 0.5);
        u.uTime.value = t;
      }
    }
  }
  /* Spuren: Geometrie nur bei Änderung neu schreiben */
  if (SYS.view.trails){
    for (const b of SYS.bodies){
      b.trail.visible = true;
      if (!b.trailDirty) continue;
      b.trailDirty = false;
      const tp = b.trailPts;
      const pos = b.trail.geometry.attributes.position, col = b.trail.geometry.attributes.color;
      _c1.set(b.accent);
      for (let i = 0; i < tp.length; i++){
        pos.setXYZ(i, tp[i][0], tp[i][1], tp[i][2]);
        const f = Math.pow(i / tp.length, 1.7) * 0.55;
        col.setXYZ(i, _c1.r * f, _c1.g * f, _c1.b * f);
      }
      pos.needsUpdate = true; col.needsUpdate = true;
      b.trail.geometry.setDrawRange(0, tp.length);
    }
  } else for (const b of SYS.bodies) b.trail.visible = false;
  /* Oskulierende Bahnen */
  ellTimer -= dt;
  if (ellTimer <= 0){
    ellTimer = 0.28;
    let mS = 0; const cp = _v1.set(0, 0, 0), cv = _v2.set(0, 0, 0);
    for (const s of stars){ mS += s.m; cp.addScaledVector(s.pos, s.m); cv.addScaledVector(s.vel, s.m); }
    if (mS > 0){ cp.divideScalar(mS); cv.divideScalar(mS); }
    for (const b of SYS.bodies){
      if (b.kind === 'star' || !SYS.view.orbits || mS <= 0){ b.ellipse.visible = false; continue; }
      const rel = b.pos.clone().sub(cp), relV = b.vel.clone().sub(cv);
      const mu = MU0 * SYS.Gfac * mS;
      const osc = osculating(rel.x, rel.y, rel.z, relV.x, relV.y, relV.z, mu);
      if (osc.a > 140 && osc.eps < 0){ b.ellipse.visible = false; continue; }
      b.ellipse.visible = true;
      writeOrbitLine(b.ellipse.geometry, rel, relV, mu, cp);
    }
  }
  if (SYS.hzMesh) SYS.hzMesh.visible = SYS.view.hz;
  updateBeltUniforms();
  /* Kollisions-Blitze */
  for (let i = flashSprites.length - 1; i >= 0; i--){
    const sp = flashSprites[i];
    sp.userData.t += dt * 2.2;
    sp.scale.setScalar(sp.userData.base * (0.3 + sp.userData.t * 2.4));
    sp.material.opacity = Math.max(0, 1 - sp.userData.t);
    if (sp.userData.t >= 1){ sysScene.remove(sp); flashSprites.splice(i, 1); }
  }
  /* Fokus-Marker + Kamera */
  if (SYS.focus && SYS.focus.alive){
    ensureMarker();
    markerSprite.position.copy(SYS.focus.dPos);
    markerSprite.scale.setScalar((SYS.focus.vis.group.scale.x || 1) * 3.6 * (1 + 0.07 * Math.sin(t * 4)));
    markerSprite.material.opacity = 0.5 + 0.25 * Math.sin(t * 4);
    orbit.target.lerp(SYS.focus.dPos, 0.16);
  } else if (!SYS.addMode){
    orbit.target.lerp(_v1.set(0, 0, 0), 0.06);
  }
  /* Labels */
  labelTimer -= dt;
  if (labelTimer <= 0){
    labelTimer = 0.33;
    for (const b of SYS.bodies){
      if (!b.label) continue;
      const r = b.pos.length();
      b.label.d.querySelector('.sub')?.remove();
      if (b.kind !== 'star' || stars.length > 1){
        const s = el('span', 'sub', fmt(r, r < 10 ? 2 : 1) + ' AE');
        b.label.d.appendChild(s);
      }
    }
    updateSysInfo();
  }
  sysLabels.update(SYS.view.labels);
  updateTimebarClock();
}

function cometTick(b, dt, stars){
  const c = b.comet;
  const star = stars[0];
  const r = star ? b.pos.distanceTo(star.pos) : 99;
  const act = clamp(5.5 / (r * r), 0, 3.2);
  c.coma.position.copy(b.dPos);
  c.coma.scale.setScalar(1.6 + act * 3.6);
  c.coma.material.opacity = 0.18 + act * 0.2;
  const anti = star ? _v1.copy(b.dPos).sub(star.dPos).normalize() : _v1.set(1, 0, 0);
  /* neue Partikel */
  c.acc = (c.acc || 0) + act * 130 * dt;
  const rnd = Math.random;
  while (c.acc >= 1){
    c.acc -= 1;
    if (c.parts.length < 300) c.parts.push({
      x: b.dPos.x + (rnd() - 0.5) * 0.5, y: b.dPos.y + (rnd() - 0.5) * 0.5, z: b.dPos.z + (rnd() - 0.5) * 0.5,
      vx: anti.x * (7 + rnd() * 8) + (rnd() - 0.5) * 2.2, vy: anti.y * (7 + rnd() * 8) + (rnd() - 0.5) * 2.2,
      vz: anti.z * (7 + rnd() * 8) + (rnd() - 0.5) * 2.2, life: 1, max: 1.1 + rnd() * 1.3 });
    if (c.dparts.length < 300 && rnd() < 0.75) c.dparts.push({
      x: b.dPos.x, y: b.dPos.y, z: b.dPos.z,
      vx: anti.x * (2.6 + rnd() * 2.6) + (rnd() - 0.5) * 1.4, vy: anti.y * (2.6 + rnd() * 2.6) + (rnd() - 0.5) * 1.4,
      vz: anti.z * (2.6 + rnd() * 2.6) + (rnd() - 0.5) * 1.4, life: 1, max: 1.8 + rnd() * 1.8 });
  }
  const upd = (arr, pts, cr, cg, cb) => {
    const pos = pts.geometry.attributes.position, col = pts.geometry.attributes.color;
    let n = 0;
    for (let i = arr.length - 1; i >= 0; i--){
      const p = arr[i];
      p.life -= dt / p.max;
      if (p.life <= 0){ arr.splice(i, 1); continue; }
      p.x += p.vx * dt; p.y += p.vy * dt; p.z += p.vz * dt;
    }
    for (const p of arr){
      pos.setXYZ(n, p.x, p.y, p.z);
      col.setXYZ(n, cr * p.life, cg * p.life, cb * p.life);
      n++;
    }
    pos.needsUpdate = true; col.needsUpdate = true;
    pts.geometry.setDrawRange(0, n);
  };
  upd(c.parts, c.pts, 0.62, 0.85, 1.0);
  upd(c.dparts, c.dust, 0.95, 0.85, 0.62);
}

/* ---------- Klick-Auswahl (Systemmodus) ---------- */
orbit.onClick = e => {
  if (MODE !== 'sys' || SYS.addMode) return;
  const b = pickAtScreen(e.clientX, e.clientY);
  if (b) focusBody(b); else unfocus();
};

/* ---------- Modus wechseln ---------- */
const camState = { lab: { th: 0.65, ph: 1.2, r: 3.4, minR: 1.45, maxR: 34 }, sys: { th: 0.5, ph: 0.72, r: 330, minR: 9, maxR: 950 } };
function switchMode(m){
  if (m === MODE) return;
  /* Kamera merken */
  camState[MODE].th = orbit.tTheta; camState[MODE].ph = orbit.tPhi; camState[MODE].r = orbit.tR;
  MODE = m;
  $('#tab-lab').classList.toggle('on', m === 'lab');
  $('#tab-sys').classList.toggle('on', m === 'sys');
  const cs = camState[m];
  orbit.minR = m === 'sys' && SYS.focus ? Math.max(1.6, SYS.focus.vis.group.scale.x * 2.6) : cs.minR;
  orbit.maxR = cs.maxR;
  orbit.setView(cs.th, cs.ph, cs.r, true);
  orbit.target.set(0, 0, 0);
  if (m === 'lab'){
    toggleAddMode(false);
    $('#timebar').classList.add('hidden');
    sysLabels.update(false);
    buildLabPanel(); updateLabInfo();
  } else {
    $('#timebar').classList.remove('hidden');
    buildSysPanel();
    if (SYS.focus) buildSysInfo(SYS.focus); else hideSysInfo();
  }
}
$('#tab-lab').addEventListener('click', () => switchMode('lab'));
$('#tab-sys').addEventListener('click', () => switchMode('sys'));

/* ---------- Panel ein-/ausblenden ---------- */
const panelEl = $('#panel'), fab = $('#panelfab');
const isMobile = () => window.matchMedia('(max-width: 900px)').matches;
function setPanelOpen(open){
  if (isMobile()) panelEl.classList.toggle('open', open);
  else { panelEl.style.transform = open ? '' : 'translateX(calc(100% + 24px))'; panelEl.style.opacity = open ? '' : '0';
    panelEl.style.pointerEvents = open ? '' : 'none'; }
  fab.style.display = (!open || isMobile()) ? 'flex' : 'none';
  panelOpen = open;
}
let panelOpen = true;
$('#panelclose').addEventListener('click', () => setPanelOpen(false));
fab.addEventListener('click', () => setPanelOpen(isMobile() ? !panelEl.classList.contains('open') : true));

/* ---------- Tastatur ---------- */
window.addEventListener('keydown', e => {
  if (e.target && /INPUT|SELECT|TEXTAREA/.test(e.target.tagName)) return;
  if (e.code === 'Space' && MODE === 'sys'){ e.preventDefault(); SYS.running = !SYS.running; buildTimebar(); }
  if (e.key === '1') switchMode('lab');
  if (e.key === '2') switchMode('sys');
  if (e.key === 'Escape'){ if (SYS.addMode) toggleAddMode(false); else if (SYS.focus) unfocus(); }
  if (e.key === 'l' && MODE === 'sys') SYS.view.labels = !SYS.view.labels;
  if (e.key === 'o' && MODE === 'sys') SYS.view.orbits = !SYS.view.orbits;
});

/* ---------- Qualitäts-Anpassung ---------- */
let frameAcc = 0, frameN = 0;
function adaptQuality(ms){
  frameAcc += ms; frameN++;
  if (frameN >= 110){
    const avg = frameAcc / frameN;
    frameAcc = 0; frameN = 0;
    if (avg > 34 && PIXEL_RATIO > 1){ PIXEL_RATIO = Math.max(1, PIXEL_RATIO - 0.25); renderer.setPixelRatio(PIXEL_RATIO); }
  }
}

/* ============================================================
 *  BOOT
 * ============================================================ */
const LOAD_TIPS = [
  'Vermesse Umlaufbahnen …', 'Kalibriere Gravitationskonstante …', 'Poliere Saturnringe …',
  'Zähle Jupitermonde … 95, 96 …', 'Wecke die Sonne …', 'Verteile Sternenstaub …',
];
async function boot(){
  const msg = $('#loadmsg'), bar = $('#loadbar');
  let tipI = 0;
  const tipT = setInterval(() => { msg.textContent = LOAD_TIPS[tipI++ % LOAD_TIPS.length]; }, 900);
  const preload = ['milky', 'sun', 'merkur', 'venusSurface', 'venusAtmo', 'erdeDay', 'erdeNight', 'erdeNormal', 'erdeSpec',
    'erdeClouds', 'mond', 'mars', 'jupiter', 'saturn', 'saturnRing', 'uranus', 'neptun', 'pluto', 'marsBump', 'mondBump', 'merkurBump'];
  TexMan.planned = preload.length;
  TexMan.onprogress = (done, total) => { bar.style.width = Math.round(done / total * 82) + '%'; };
  await Promise.all(preload.map(n => TexMan.get(n)));
  bar.style.width = '86%';
  await buildSky(labScene); await buildSky(sysScene);
  buildLabSunSprite();
  buildBelt(1900, 2.12, 3.35, 2.6, 2.9, '#8a7f72', '#6a6058', 900);   /* Asteroidengürtel */
  buildBelt(1300, 32, 48, 5, 3.1, '#7d8ba0', '#5d6a80', 901);         /* Kuipergürtel */
  bar.style.width = '90%';
  await initSys('heute');
  buildTimebar();
  buildLabPanel();
  await buildLabBody();
  bar.style.width = '100%';
  clearInterval(tipT);
  if (TexMan.status.net === 0 && TexMan.status.proc > 0)
    toast('🛰️ Keine Verbindung zu den NASA-Texturen — prozeduraler Offline-Modus aktiv.', 5000);
  orbit.minR = camState.lab.minR; orbit.maxR = camState.lab.maxR;
  orbit.setView(0.65, 1.2, 3.4, true);
  $('#loader').classList.add('done');
  setTimeout(() => $('#loader').remove(), 800);
  /* Prozedurale Textur-Pools für neue Planeten (im Leerlauf) */
  setTimeout(() => {
    SYS.procPool.rock.push(procRocky(101, 'fels', 512), procRocky(102, 'mars', 512), procRocky(103, 'pluto', 512));
    SYS.procPool.gas.push(procGas(104, 'exoWarm', 512), procGas(105, 'exoBlau', 512), procGas(106, 'neptun', 512));
  }, 1600);
  /* Loop */
  let last = performance.now();
  window.__simReady = true;
  function frame(now){
    const ms = now - last;
    const dt = clamp(ms / 1000, 0, 0.1);
    last = now;
    simClock += dt;
    orbit.update();
    if (MODE === 'lab'){ labTick(dt); renderer.render(labScene, camera); }
    else { sysTick(dt, simClock); renderer.render(sysScene, camera); }
    adaptQuality(ms);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}
/* Test-Haken */
window.__sim = { SYS, LAB, TexMan, get MODE(){ return MODE; }, switchMode, initSys, spawnComet, spawnRogue,
  stateFromElements, osculating, julianNow, MU0, AUYR_KMS, focusBody, toggleAddMode, BODIES,
  setSunMass, refreshHZ, genWorld, defWorld, climateSnap, labParams, rocheBreak, updateMoonDists,
  setLabBody: async k => { LAB.key = k; buildLabPanel(); await buildLabBody(); } };
boot().catch(err => {
  console.error(err);
  const m = $('#loadmsg'); if (m) m.textContent = 'Fehler beim Start: ' + err.message;
});
</script>
